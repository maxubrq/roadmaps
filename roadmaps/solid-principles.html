<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLID Principles — Deep Mastery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0e11;
  --bg2: #13151a;
  --bg3: #1a1d24;
  --bg4: #20242e;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8b90a0;
  --text3: #555b6e;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
  --display: 'Syne', sans-serif;
  --radius: 10px;
  --radius-lg: 16px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* HEADER */
.site-header {
  padding: 2.5rem 0 0;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute;
  top: -80px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 300px;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.15;
  pointer-events: none;
  transition: background .4s;
}
.eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 1rem;
}
.main-title {
  font-family: var(--display);
  font-size: clamp(2.5rem, 6vw, 4.5rem);
  font-weight: 800;
  letter-spacing: -.02em;
  line-height: 1.05;
  margin-bottom: .75rem;
}
.main-title .solid-letters { display: inline-flex; gap: 0; }
.main-title .sl {
  display: inline-block;
  transition: color .3s;
}
.main-desc {
  font-size: 15px;
  color: var(--text2);
  max-width: 480px;
  margin: 0 auto 2.5rem;
  line-height: 1.7;
}

/* PRINCIPLE PILLS */
.pill-nav {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 0 1rem 0;
  flex-wrap: wrap;
}
.pill-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  border-radius: 40px;
  border: 1.5px solid;
  cursor: pointer;
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .03em;
  transition: all .2s;
  background: transparent;
}
.pill-btn:hover { transform: translateY(-2px); }
.pill-btn.active { color: #fff; }
.pill-btn .pill-letter {
  font-size: 18px;
  font-weight: 800;
  line-height: 1;
}

/* MAIN LAYOUT */
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* PRINCIPLE HEADER */
.principle-header {
  display: flex;
  align-items: flex-start;
  gap: 1.25rem;
  margin-bottom: 2rem;
  padding: 1.75rem;
  background: var(--bg2);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  animation: fadeUp .35s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.principle-letter-big {
  font-family: var(--display);
  font-size: 56px;
  font-weight: 800;
  line-height: 1;
  flex-shrink: 0;
}
.principle-meta {}
.principle-name {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 4px;
  line-height: 1.2;
}
.principle-oneliner {
  font-size: 14px;
  color: var(--text2);
  line-height: 1.6;
  font-style: italic;
}

/* TABS */
.tab-bar {
  display: flex;
  gap: 4px;
  margin-bottom: 1.5rem;
  flex-wrap: wrap;
}
.tab-btn {
  padding: 7px 16px;
  border-radius: 30px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}
.tab-btn:hover { border-color: var(--border2); color: var(--text); }
.tab-btn.on {
  background: var(--bg3);
  border-color: var(--border2);
  color: var(--text);
  font-weight: 500;
}

/* CARDS */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1rem;
  animation: fadeUp .3s ease both;
}
.card.accent-left {
  border-left: 3px solid;
  border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
}
.card-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 8px;
}
.card-title {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 12px;
}

/* SCENARIO BADGE */
.scenario-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--mono);
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 20px;
  margin-bottom: 1rem;
  letter-spacing: .03em;
}
.scenario-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: currentColor;
  opacity: .6;
}

/* HOOK TEXT */
.hook-text {
  font-size: 14px;
  line-height: 1.75;
  color: var(--text2);
}
.hook-text code {
  font-family: var(--mono);
  font-size: 12px;
  background: var(--bg4);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--text);
}

/* SCENE BLOCK */
.scene {
  border-left: 3px solid;
  background: var(--bg3);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1rem 1.25rem;
  margin: .75rem 0;
}
.scene pre {
  font-family: var(--sans);
  font-size: 13px;
  line-height: 1.85;
  color: var(--text2);
  white-space: pre-wrap;
}

/* INSIGHT ROW */
.insight-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  background: var(--bg3);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-top: 10px;
}
.insight-arrow { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
.insight-text { font-size: 13px; color: var(--text2); line-height: 1.7; }
.insight-text strong { color: var(--text); font-weight: 500; }

/* CODE COMPARE */
.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: .75rem;
}
@media (max-width: 600px) { .compare { grid-template-columns: 1fr; } }
.code-block {
  border-radius: var(--radius);
  padding: 12px 14px;
}
.code-block.bad { background: rgba(220,38,38,.08); border: 1px solid rgba(220,38,38,.2); }
.code-block.good { background: rgba(34,197,94,.07); border: 1px solid rgba(34,197,94,.18); }
.code-block-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.code-block.bad .code-block-label { color: #ef4444; }
.code-block.good .code-block-label { color: #22c55e; }

/* CODE */
pre {
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.7;
  color: #8b9abc;
  white-space: pre-wrap;
  word-break: break-word;
}
.kw  { color: #7aa2f7; }
.cls { color: #e0af68; }
.cm  { color: #4a5168; font-style: italic; }
.err { color: #f7768e; }
.ok  { color: #9ece6a; }
.str { color: #9ece6a; }

/* STEPS */
.steps { }
.step {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.step:last-child { border-bottom: none; }
.step-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  min-width: 22px;
  padding-top: 2px;
  flex-shrink: 0;
}
.step-title {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 5px;
}
.step-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.7;
  margin-bottom: 8px;
}
.step-code {
  background: var(--bg3);
  border-radius: var(--radius);
  padding: 10px 12px;
  border: 1px solid var(--border);
}

/* FINAL TEST */
.final-block {
  background: rgba(34,197,94,.06);
  border: 1px solid rgba(34,197,94,.15);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-top: 12px;
}
.final-label {
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #22c55e;
  margin-bottom: 8px;
}

/* RULES */
.rule {
  display: flex;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.rule:last-child { border-bottom: none; }
.rule-num {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  min-width: 20px;
  padding-top: 2px;
  flex-shrink: 0;
}
.rule-title {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.rule-body { font-size: 13px; color: var(--text2); line-height: 1.65; }
.rule-body code {
  font-family: var(--mono);
  font-size: 11.5px;
  background: var(--bg4);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--text);
}

/* MYTHS */
.myth {
  background: var(--bg3);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}
.myth-q { font-family: var(--mono); font-size: 12px; font-weight: 500; color: #f7768e; margin-bottom: 5px; }
.myth-a { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* CHECKLIST */
.check-item {
  display: flex;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  align-items: flex-start;
}
.check-item:last-child { border-bottom: none; }
.check-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 7px;
}
.check-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* NAV */
.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 18px;
  border-radius: 30px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  font-family: var(--sans);
  font-size: 13px;
  cursor: pointer;
  transition: all .15s;
}
.nav-btn:hover { background: var(--bg3); color: var(--text); border-color: var(--border2); }
.progress-dots { display: flex; gap: 6px; align-items: center; }
.pdot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border2);
  cursor: pointer;
  transition: all .2s;
  border: none;
  padding: 0;
}
.pdot.on { transform: scale(1.5); }

/* FOOTER */
.site-footer {
  text-align: center;
  padding: 2rem 1rem 3rem;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text3);
  letter-spacing: .06em;
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* RESPONSIVE */
@media (max-width: 600px) {
  .principle-header { flex-direction: column; gap: .75rem; }
  .principle-letter-big { font-size: 40px; }
}
</style>
</head>
<body>

<header class="site-header" id="site-header">
  <p class="eyebrow">Software engineering fundamentals</p>
  <h1 class="main-title">
    <span class="solid-letters" id="solid-letters"></span>
    <br>
    <span style="color: var(--text2); font-size: .45em; font-weight: 500; letter-spacing: -.01em;">Principles</span>
  </h1>
  <p class="main-desc">Real stories. Real code. Real refactoring walkthroughs. Built for engineers who want to understand deeply, explain clearly, and apply immediately.</p>
  <nav class="pill-nav" id="pill-nav"></nav>
</header>

<main class="container">
  <div id="principle-header"></div>
  <div class="tab-bar" id="tab-bar"></div>
  <div id="body"></div>
  <div class="nav-bar">
    <button class="nav-btn" id="prev-btn" onclick="go((cur+4)%5)">← <span id="prev-label"></span></button>
    <div class="progress-dots" id="progress-dots"></div>
    <button class="nav-btn" id="next-btn" onclick="go((cur+1)%5)"><span id="next-label"></span> →</button>
  </div>
</main>

<footer class="site-footer">
  SOLID Principles — Built for freshers &amp; junior engineers who mean business
</footer>

<script>
var D = [
{
  L:"S", ac:"#7c6ff7", bg:"rgba(124,111,247,0.12)", border:"rgba(124,111,247,0.35)",
  name:"Single responsibility",
  oneliner:"One class. One boss. One reason to ever change it.",
  story:{
    badge:"Real scenario: Social media startup",
    hook:"It's your first week. The senior dev says \"just add the analytics tracking to the User class, it already has everything.\" Six months later, that class is 800 lines, three teams fight over it every sprint, and nobody understands what it does anymore.",
    title:"3 AM. Production is down. Two devs are blaming each other.",
    scene:"It's 11 PM. Priya (Growth team) merged her A/B test changes to User.js.\nCarlos (Auth team) had also been editing User.js — his OAuth2 fix.\n\nGit picked Carlos's version. Priya's tracking code vanished.\nNobody noticed until 3 AM when the CEO asked\nwhy signup conversions dropped to zero.\n\nThe class had three bosses:\n→ Growth team    (tracking, funnels, experiments)\n→ Auth team      (login, OAuth, sessions)\n→ Data team      (persistence, migrations, exports)\n\nThree bosses = three reasons to change = one disaster.",
    insight:"<strong>SRP is not about class size. It's about political boundaries.</strong> Ask: if this code changes, which Slack channel gets pinged? If the answer is more than one — that's your violation.",
    bad:`<span class="cls">class User</span> {
  <span class="cm">// Auth team owns this</span>
  <span class="kw">async</span> login(email, password) { ... }
  <span class="kw">async</span> refreshOAuthToken() { ... }

  <span class="cm">// Growth team owns this</span>
  trackSignupFunnel(step) { analytics.track(...) }
  getABTestVariant(test) { ... }

  <span class="cm">// Data team owns this</span>
  <span class="kw">async</span> saveToDatabase() { ... }
  exportToCSV() { ... }

  <span class="err">// 3 teams. 3 Slack channels. 1 class. Pure chaos.</span>
}`,
    good:`<span class="cm">// auth/auth.service.js — Auth team owns this</span>
<span class="kw">class</span> <span class="cls">AuthService</span> {
  <span class="kw">async</span> login(email, password) { ... }
  <span class="kw">async</span> refreshOAuthToken() { ... }
}

<span class="cm">// growth/tracking.service.js — Growth team owns this</span>
<span class="kw">class</span> <span class="cls">TrackingService</span> {
  trackSignupFunnel(userId, step) { ... }
  getABTestVariant(userId, test) { ... }
}

<span class="cm">// data/user.repository.js — Data team owns this</span>
<span class="kw">class</span> <span class="cls">UserRepository</span> {
  <span class="kw">async</span> save(user) { ... }
  exportToCSV(filters) { ... }
}
<span class="ok">// Priya and Carlos can now merge simultaneously. Forever.</span>`
  },
  walkthrough:{
    badge:"Codebase: Node.js Express API at a fintech startup",
    scenario:"An Order class that the finance team, the logistics team, and the notifications team all edit. Every release is a negotiation over who deploys first.",
    steps:[
      { title:"Map every method to its owner first — before touching code",
        desc:"Print the class. Go through each method and write the team name next to it. Any class with two or more team names is a SRP violation. This audit takes 10 minutes and prevents weeks of pain.",
        code:`<span class="cm">// The audit — annotate before you refactor:</span>
<span class="kw">class</span> <span class="cls">Order</span> {
  calculateTax()        <span class="cm">// Finance ← owner</span>
  applyVATRules()       <span class="cm">// Finance ← owner</span>
  generateInvoicePDF()  <span class="cm">// Finance ← owner</span>
  assignToWarehouse()   <span class="cm">// Logistics ← owner</span>
  estimateDelivery()    <span class="cm">// Logistics ← owner</span>
  sendConfirmationSMS() <span class="cm">// Notifications ← owner</span>
  save()                <span class="cm">// DB team ← owner</span>
  <span class="err">// Result: 4 owners. This class must be split.</span>
}` },
      { title:"Extract the finance concern — leave the data alone",
        desc:"Finance logic moves out. It receives an Order as input — plain data. It does not need to inherit from Order or know about warehouses.",
        code:`<span class="cm">// src/finance/order-billing.service.js</span>
<span class="kw">class</span> <span class="cls">OrderBillingService</span> {
  calculateTax(order) {
    <span class="kw">const</span> rate = VAT_RATES[order.country] ?? 0.2
    <span class="kw">return</span> order.subtotal * rate
  }
  generateInvoicePDF(order) {
    <span class="kw">return</span> PDFGenerator.render(<span class="str">'invoice'</span>, order)
  }
}
<span class="ok">// Finance team has their own file. They deploy independently.</span>` },
      { title:"Extract the logistics concern",
        desc:"Warehouse assignment and delivery estimation have nothing to do with invoices. They move to their own service with their own tests.",
        code:`<span class="cm">// src/logistics/order-fulfillment.service.js</span>
<span class="kw">class</span> <span class="cls">OrderFulfillmentService</span> {
  <span class="kw">async</span> assignToWarehouse(order) {
    <span class="kw">const</span> wh = <span class="kw">await</span> Warehouse.findNearest(order.destination)
    order.warehouseId = wh.id
    <span class="kw">return</span> wh
  }
  estimateDelivery(order, warehouse) {
    <span class="kw">return</span> DeliveryEstimator.calculate(order, warehouse)
  }
}
<span class="ok">// Logistics ships their features without touching billing.</span>` },
      { title:"Extract notifications — the most underrated split",
        desc:"Notification logic almost always gets stuffed into the domain model. It never belongs there. It depends on templates, third-party SDKs, and user preferences — a completely different change axis.",
        code:`<span class="cm">// src/notifications/order-notifications.service.js</span>
<span class="kw">class</span> <span class="cls">OrderNotificationsService</span> {
  <span class="kw">async</span> sendConfirmation(order, user) {
    <span class="kw">await</span> SMS.send(user.phone, \`Order \${order.id} confirmed\`)
    <span class="kw">await</span> Email.send(user.email, templates.confirmation(order))
  }
}
<span class="ok">// Template changes, new channels — all isolated here.</span>` },
      { title:"The Order model becomes a clean data object",
        desc:"What remains is pure data. No logic from any team. The domain model is now stable — it changes only when the fundamental business data structure changes.",
        code:`<span class="cm">// src/orders/order.model.js</span>
<span class="kw">class</span> <span class="cls">Order</span> {
  <span class="kw">constructor</span>(data) {
    <span class="kw">this</span>.id       = data.id
    <span class="kw">this</span>.userId    = data.userId
    <span class="kw">this</span>.subtotal  = data.subtotal
    <span class="kw">this</span>.country   = data.country
    <span class="kw">this</span>.status    = data.status ?? <span class="str">'pending'</span>
  }
}
<span class="ok">// One owner: the DB team. One reason to change: data schema.</span>` }
    ],
    final:`<span class="cm">// Before: testing tax required mocking warehouses and SMS</span>
<span class="cm">// After:</span>
<span class="kw">test</span>(<span class="str">'UK order gets 20% VAT'</span>, () => {
  <span class="kw">const</span> order   = <span class="kw">new</span> <span class="cls">Order</span>({ subtotal: 100, country: <span class="str">'GB'</span> })
  <span class="kw">const</span> billing = <span class="kw">new</span> <span class="cls">OrderBillingService</span>()
  expect(billing.calculateTax(order)).toBe(20)
})
<span class="ok">// No warehouse. No SMS. No noise. Tests run in 8ms.</span>`
  },
  rules:[
    { n:"1", title:"Ask which Slack channel gets pinged, not how many lines there are",
      body:"Before writing a class, ask: if this changes, who needs to be notified? One channel = one responsibility. Two channels = split it." },
    { n:"2", title:"Merge conflicts are SRP violations wearing a different costume",
      body:"When two unrelated features cause a merge conflict on the same file, that file is violating SRP. The conflict is the diagnosis. Stop resolving it — start refactoring." },
    { n:"3", title:"The facade pattern saves the public API",
      body:"If splitting breaks existing callers, add a thin facade that delegates to the new classes. External API unchanged. Internal structure fixed." }
  ],
  myths:[
    { q:'"SRP means tiny classes with one method each"',
      a:"A PaymentProcessor with charge(), refund(), getStatus() — all owned by the payments team — is perfectly fine at 200 lines. Size is irrelevant. Political ownership is everything." },
    { q:'"We should split this class to follow SRP"',
      a:"Only split when two different people or teams have conflicting reasons to change it. Splitting for the sake of splitting creates scattered, hard-to-navigate code." }
  ],
  checks:[
    "Two unrelated feature tickets both require editing the same file",
    "A bug in the shipping logic causes you to redeploy the billing code",
    "Testing one feature requires setting up mocks for a completely unrelated feature"
  ]

var cur = 0, tab = 'story';

function applyAccent(p) {
  document.documentElement.style.setProperty('--cur-ac', p.ac);
  var header = document.getElementById('site-header');
  header.style.setProperty('--glow-color', p.ac);
  var before = document.querySelector('.site-header::before');
  document.getElementById('site-header').style.cssText += '--glow:'+p.ac;

  var style = document.getElementById('glow-style') || document.createElement('style');
  style.id = 'glow-style';
  style.textContent = `.site-header::before { background: ${p.ac}; }`;
  document.head.appendChild(style);
}

function buildPills() {
  var nav = document.getElementById('pill-nav');
  nav.innerHTML = D.map(function(p, i) {
    var active = i === cur;
    return `<button class="pill-btn ${active ? 'active' : ''}"
      style="border-color:${p.ac};color:${active ? '#fff' : p.ac};background:${active ? p.ac : p.bg}"
      onclick="go(${i})">
      <span class="pill-letter">${p.L}</span>
      <span>${p.name}</span>
    </button>`;
  }).join('');
}

function buildTitle() {
  var letters = document.getElementById('solid-letters');
  letters.innerHTML = D.map(function(p, i) {
    return `<span class="sl" style="color:${i === cur ? p.ac : 'var(--text3)'}">${p.L}</span>`;
  }).join('');
}

function buildPrincipleHeader() {
  var p = D[cur];
  document.getElementById('principle-header').innerHTML = `
    <div class="principle-header" style="animation:fadeUp .35s ease both">
      <div class="principle-letter-big" style="color:${p.ac}">${p.L}</div>
      <div class="principle-meta">
        <div class="principle-name">${p.name}</div>
        <div class="principle-oneliner">${p.oneliner}</div>
      </div>
    </div>`;
}

function buildTabs() {
  var tabs = ['story','walkthrough','rules','myths','checklist'];
  var labels = ['Story','Walkthrough','Rules','Myths','Checklist'];
  document.getElementById('tab-bar').innerHTML = tabs.map(function(t, i) {
    return `<button class="tab-btn ${t === tab ? 'on' : ''}" onclick="setTab('${t}')">${labels[i]}</button>`;
  }).join('');
}

function badge(text, ac) {
  return `<div class="scenario-badge" style="background:${ac}20;color:${ac}">${text}</div>`;
}

function buildBody() {
  var p = D[cur];
  var html = '';

  if (tab === 'story') {
    html = badge(p.story.badge, p.ac)
      + `<div class="card accent-left" style="border-left-color:${p.ac}">
           <div class="card-label" style="color:${p.ac}">The hook</div>
           <div class="hook-text">${p.story.hook}</div>
         </div>`
      + `<div class="card">
           <div class="card-title">${p.story.title}</div>
           <div class="scene" style="border-left-color:${p.ac}"><pre>${p.story.scene}</pre></div>
           <div class="insight-row">
             <div class="insight-arrow" style="color:${p.ac}">→</div>
             <div class="insight-text">${p.story.insight}</div>
           </div>
         </div>`
      + `<div style="font-family:var(--display);font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;letter-spacing:.02em">CODE: BEFORE VS AFTER</div>`
      + `<div class="compare">
           <div class="code-block bad"><div class="code-block-label">The violation</div><pre>${p.story.bad}</pre></div>
           <div class="code-block good"><div class="code-block-label">Fixed</div><pre>${p.story.good}</pre></div>
         </div>`;
  }

  else if (tab === 'walkthrough') {
    var steps = p.walkthrough.steps.map(function(s, i) {
      return `<div class="step">
        <div class="step-num" style="color:${p.ac}">${i+1}</div>
        <div>
          <div class="step-title">${s.title}</div>
          <div class="step-desc">${s.desc}</div>
          <div class="step-code"><pre>${s.code}</pre></div>
        </div>
      </div>`;
    }).join('');
    html = badge(p.walkthrough.badge, p.ac)
      + `<div class="card accent-left" style="border-left-color:${p.ac}">
           <div class="card-label" style="color:${p.ac}">Scenario</div>
           <div class="hook-text">${p.walkthrough.scenario}</div>
         </div>`
      + `<div class="card">
           <div class="card-title">Full refactoring — step by step</div>
           <div class="steps">${steps}</div>
           <div class="final-block">
             <div class="final-label">The test that proves it worked</div>
             <pre>${p.walkthrough.final}</pre>
           </div>
         </div>`;
  }

  else if (tab === 'rules') {
    html = `<div class="card">
      <div class="card-title">The 3 things to actually internalize</div>
      ${p.rules.map(function(r) {
        return `<div class="rule">
          <div class="rule-num" style="color:${p.ac}">${r.n}</div>
          <div>
            <div class="rule-title">${r.title}</div>
            <div class="rule-body">${r.body}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  else if (tab === 'myths') {
    html = `<div class="card">
      <div class="card-title">Things that will confuse you when you hear them</div>
      ${p.myths.map(function(m) {
        return `<div class="myth">
          <div class="myth-q">${m.q}</div>
          <div class="myth-a">${m.a}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  else if (tab === 'checklist') {
    html = `<div class="card">
      <div class="card-title">Diagnose this in your own codebase right now</div>
      ${p.checks.map(function(c) {
        return `<div class="check-item">
          <div class="check-dot" style="background:${p.ac}"></div>
          <div class="check-text">${c}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  document.getElementById('body').innerHTML = html;
}

function buildNav() {
  var prev = D[(cur+4)%5];
  var next = D[(cur+1)%5];
  document.getElementById('prev-label').textContent = prev.L + ' — ' + prev.name;
  document.getElementById('next-label').textContent = next.name + ' — ' + next.L;
  document.getElementById('progress-dots').innerHTML = D.map(function(p, i) {
    return `<button class="pdot ${i===cur?'on':''}" style="${i===cur?'background:'+p.ac:''}" onclick="go(${i})"></button>`;
  }).join('');
}

function render() {
  var p = D[cur];
  applyAccent(p);
  buildPills();
  buildTitle();
  buildPrincipleHeader();
  buildTabs();
  buildBody();
  buildNav();
}

function go(i) {
  cur = i; tab = 'story';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setTab(t) {
  tab = t;
  buildTabs();
  buildBody();
}

render();
</script>
