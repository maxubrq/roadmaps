                <div style={{ background: "#ffffff08", border: "1px solid #ffffff10", borderRadius: 4, padding: "12px 16px" }}>
                  <span style={{ fontSize: 10, color: "#8a8070", letterSpacing: "0.2em", textTransform: "uppercase" }}>IRREVERSIBLE MARKER: </span>
                  <span style={{ fontSize: 13, color: "#b0a898", fontStyle: "italic" }}>{phase.irreversible}</span>
                </div>
              </div>

              {/* Tabs */}
              <div style={{ display: "flex", gap: 4, marginTop: 16, borderBottom: "1px solid #1e1a16" }}>
                {[
                  { id: "skills", label: "Core Skills" },
                  { id: "practice", label: "Practice" },
                  { id: "resources", label: "Resources" },
                  { id: "milestones", label: "Milestones" },
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      background: "transparent",
                      border: "none",
                      borderBottom: activeTab === tab.id ? "2px solid " + phase.color : "2px solid transparent",
                      padding: "10px 18px",
                      cursor: "pointer",
                      fontSize: 12,
                      letterSpacing: "0.08em",
                      color: activeTab === tab.id ? phase.color : "#5a5040",
                      textTransform: "uppercase",
                      marginBottom: -1,
                      transition: "all 0.15s",
                    }}
                  >
                    {tab.label}
                  </button>
                ))}
              </div>

              {/* Tab Content */}
              <div style={{ paddingTop: 24 }}>

                {activeTab === "skills" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    {phase.coreSkills.map((skill, i) => (
                      <div key={i} style={{
                        background: "#111008",
                        border: "1px solid #2a2520",
                        borderLeft: "3px solid " + phase.color,
                        borderRadius: 4,
                        padding: "20px 24px",
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                          <div style={{ fontSize: 10, fontFamily: "monospace", color: phase.color, background: phase.color + "18", padding: "3px 8px", borderRadius: 2 }}>
                            SKILL {String(i + 1).padStart(2, "0")}
                          </div>
                          <div style={{ fontSize: 15, fontWeight: 700, color: "#d8d0c0" }}>{skill.name}</div>
                        </div>
                        <p style={{ fontSize: 13, color: "#8a8070", lineHeight: 1.7, margin: "0 0 14px" }}>{skill.desc}</p>
                        <div style={{ background: "#0d0a06", border: "1px dashed #2a2520", borderRadius: 4, padding: "12px 16px" }}>
                          <div style={{ fontSize: 10, color: phase.color, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 6 }}>▸ DRILL</div>
                          <div style={{ fontSize: 13, color: "#b0a898", lineHeight: 1.65 }}>{skill.drill}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === "practice" && (
                  <div>
                    <div style={{ background: "#111008", border: "1px solid " + phase.color + "33", borderRadius: 4, padding: "24px 28px", marginBottom: 20 }}>
                      <div style={{ fontSize: 10, color: phase.color, letterSpacing: "0.25em", textTransform: "uppercase", marginBottom: 12 }}>Weekly Practice Load</div>
                      <div style={{ fontSize: 20, color: "#e8e0d0", fontWeight: 700, marginBottom: 8 }}>{phase.weeklyPractice}</div>
                      <p style={{ fontSize: 13, color: "#7a7060", lineHeight: 1.7, margin: 0 }}>
                        Đây không phải passive learning. Mỗi giờ phải có output — viết, nói, hoặc nhận feedback.
                      </p>
                    </div>
                    <div style={{ background: "#111008", border: "1px solid #2a2520", borderRadius: 4, padding: "20px 24px" }}>
                      <div style={{ fontSize: 10, color: "#7a7060", letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 16 }}>Drills từ Core Skills</div>
                      {phase.coreSkills.map((skill, i) => (
                        <div key={i} style={{
                          borderBottom: i < phase.coreSkills.length - 1 ? "1px solid #1e1a16" : "none",
                          paddingBottom: i < phase.coreSkills.length - 1 ? 16 : 0,
                          marginBottom: i < phase.coreSkills.length - 1 ? 16 : 0,
                        }}>
                          <div style={{ fontSize: 12, color: phase.color, marginBottom: 6, fontWeight: 700 }}>{skill.name}</div>
                          <div style={{ fontSize: 13, color: "#9a9080", lineHeight: 1.65 }}>{skill.drill}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {activeTab === "resources" && (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {phase.resources.map((r, i) => (
                      <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 16, background: "#111008", border: "1px solid #2a2520", borderRadius: 4, padding: "16px 20px" }}>
                        <div style={{ fontSize: 10, background: "#1e1a16", color: "#6a6050", padding: "4px 8px", borderRadius: 2, letterSpacing: "0.1em", whiteSpace: "nowrap", marginTop: 1, minWidth: 48, textAlign: "center" }}>
                          {r.type}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 14, color: "#d0c8b8", marginBottom: 3 }}><em>{r.title}</em></div>
                          <div style={{ fontSize: 12, color: "#6a6050" }}>{r.author}</div>
                        </div>
                        <div style={{ fontSize: 12 }}>{r.priority}</div>
                      </div>
                    ))}
                  </div>
                )}

                {activeTab === "milestones" && (
                  <div>
                    <p style={{ fontSize: 13, color: "#7a7060", lineHeight: 1.7, marginBottom: 24, fontStyle: "italic" }}>
                      Milestone không phải là checkbox. Chúng là bằng chứng của transformation —
                      phải được người khác xác nhận, không phải tự đánh giá.
                    </p>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      {phase.milestones.map((m, i) => (
                        <div key={i} style={{ display: "flex", gap: 16, alignItems: "flex-start", background: "#111008", border: "1px solid #2a2520", borderRadius: 4, padding: "18px 22px" }}>
                          <div style={{
                            width: 28, height: 28,
                            border: "2px solid " + phase.color,
                            borderRadius: "50%",
                            display: "flex", alignItems: "center", justifyContent: "center",
                            fontSize: 12, fontFamily: "monospace",
                            color: phase.color, flexShrink: 0, marginTop: 1,
                          }}>
                            {i + 1}
                          </div>
                          <div style={{ fontSize: 14, color: "#c8c0b0", lineHeight: 1.65 }}>{m}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ marginTop: 24, background: phase.color + "10", border: "1px solid " + phase.color + "30", borderRadius: 4, padding: "16px 20px" }}>
                      <div style={{ fontSize: 10, color: phase.color, letterSpacing: "0.2em", textTransform: "uppercase", marginBottom: 8 }}>Gate to next phase</div>
                      <div style={{ fontSize: 13, color: "#b0a898", lineHeight: 1.65 }}>
                        Chỉ move sang phase tiếp theo khi <strong style={{ color: phase.color }}>ít nhất 2/3 milestones</strong> được xác nhận bởi người ngoài. Self-assessment không đủ.
                      </div>
                    </div>
                  </div>
                )}

              </div>
            </div>
          </div>

          {/* Footer */}
          <div style={{ borderTop: "1px solid #1e1a16", padding: "24px 40px", background: "#080806" }}>
            <div style={{ maxWidth: 900, margin: "0 auto" }}>
              <div style={{ fontSize: 12, color: "#4a4030", lineHeight: 1.8, fontStyle: "italic" }}>
                "The difference between good and great communicators isn't vocabulary or confidence.
                It's the ability to hold the listener's reality in mind while expressing your own — simultaneously."
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
