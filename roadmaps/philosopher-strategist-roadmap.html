<html lang="vi">
<head>
<meta charset="UTF-8">

<title>Roadmap: World-class Philosopher & Strategist</title>
<style>
  :root {
    --bg: #f9f8f6;
    --surface: #ffffff;
    --surface2: #f2f0ec;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5a5a56;
    --text3: #9a9a94;
    --radius: 10px;
    --radius-lg: 14px;

    --p1: #3C3489; --p1-light: #EEEDFE; --p1-mid: #AFA9EC; --p1-border: #AFA9EC;
    --p2: #0C447C; --p2-light: #E6F1FB; --p2-mid: #85B7EB; --p2-border: #85B7EB;
    --p3: #085041; --p3-light: #E1F5EE; --p3-mid: #5DCAA5; --p3-border: #5DCAA5;
    --p4: #633806; --p4-light: #FAEEDA; --p4-mid: #EF9F27; --p4-border: #EF9F27;
    --p5: #4A1B0C; --p5-light: #FAECE7; --p5-mid: #F0997B; --p5-border: #F0997B;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #181816; --surface: #222220; --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      --text: #e8e6e0; --text2: #a0a09a; --text3: #666660;
      --p1-light: #26215C; --p2-light: #042C53; --p3-light: #04342C;
      --p4-light: #412402; --p5-light: #4A1B0C;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; padding: 2rem 1rem;
    line-height: 1.6;
  }
  .container { max-width: 860px; margin: 0 auto; }

  /* Header */
  .header { text-align: center; margin-bottom: 3rem; padding: 0 1rem; }
  .header h1 { font-size: clamp(22px, 4vw, 32px); font-weight: 600; letter-spacing: -.02em; margin-bottom: 10px; }
  .header p { font-size: 15px; color: var(--text2); max-width: 540px; margin: 0 auto 1.5rem; }
  .header-meta { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .meta-pill { font-size: 12px; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--border2); color: var(--text2); background: var(--surface); }

  /* Progress bar */
  .progress-track { display: flex; gap: 6px; margin-bottom: 2rem; }
  .progress-seg { flex: 1; height: 4px; border-radius: 2px; transition: background .3s; }

  /* Phase tabs */
  .phase-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .phase-tab {
    font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 20px;
    border: 0.5px solid var(--border); background: var(--surface2); color: var(--text2);
    cursor: pointer; transition: all .15s;
  }
  .phase-tab:hover { border-color: var(--border2); color: var(--text); }
  .phase-tab.active { color: #fff; border-color: transparent; }

  /* Phase panel */
  .phase-panel { display: none; border-radius: var(--radius-lg); overflow: hidden; border: 0.5px solid var(--border); }
  .phase-panel.visible { display: block; }

  .phase-hero { padding: 1.25rem 1.5rem; }
  .phase-num { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; opacity: .8; }
  .phase-title { font-size: 18px; font-weight: 600; margin: 4px 0 10px; }
  .phase-transform {
    font-size: 13px; line-height: 1.6; font-style: italic;
    padding: 8px 12px; border-radius: var(--radius); background: rgba(255,255,255,.14);
  }

  /* Section tabs */
  .section-tabs { display: flex; border-bottom: 0.5px solid var(--border); }
  .sec-tab {
    flex: 1; padding: 10px 6px; font-size: 12px; font-weight: 500; text-align: center;
    background: var(--surface2); color: var(--text2); border: none;
    border-right: 0.5px solid var(--border); cursor: pointer; transition: all .15s;
  }
  .sec-tab:last-child { border-right: none; }
  .sec-tab:hover { background: var(--surface); color: var(--text); }
  .sec-tab.active { background: var(--surface); color: var(--text); font-weight: 600; }

  .sec-body { padding: 1.25rem 1.5rem; background: var(--surface); }

  /* Items */
  .item { display: flex; gap: 10px; margin-bottom: 12px; align-items: flex-start; }
  .item:last-child { margin-bottom: 0; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
  .item-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .item-sub { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.55; }

  /* Resource rows */
  .res-row { display: flex; gap: 12px; align-items: flex-start; padding: 11px 0; border-bottom: 0.5px solid var(--border); }
  .res-row:last-child { border-bottom: none; padding-bottom: 0; }
  .res-num { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; color: #fff; margin-top: 1px; }
  .res-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .res-how { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.55; }
  .res-why { font-size: 12px; margin-top: 3px; font-style: italic; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 0.5px solid; margin: 3px 3px 0 0; }

  /* Practice blocks */
  .practice-block { border-left: 2px solid; padding: 8px 0 8px 14px; margin-bottom: 14px; }
  .practice-block:last-child { margin-bottom: 0; }
  .pb-freq { font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .pb-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
  .pb-step { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 3px; display: flex; gap: 6px; }
  .pb-step::before { content: '—'; color: var(--border2); flex-shrink: 0; }
  .pb-ex { font-size: 12px; color: var(--text); background: var(--surface2); border-radius: var(--radius); padding: 8px 10px; margin-top: 8px; line-height: 1.6; }

  /* Milestones */
  .timeline { position: relative; padding-left: 22px; }
  .timeline::before { content: ''; position: absolute; left: 6px; top: 8px; bottom: 8px; width: 0.5px; background: var(--border2); }
  .tl-item { position: relative; margin-bottom: 18px; }
  .tl-item:last-child { margin-bottom: 0; }
  .tl-dot { position: absolute; left: -19px; top: 4px; width: 9px; height: 9px; border-radius: 50%; border: 2px solid; }
  .tl-title { font-size: 13px; font-weight: 500; color: var(--text); }
  .tl-desc { font-size: 12px; color: var(--text2); margin-top: 3px; line-height: 1.55; }
  .tl-gate { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 10px; display: inline-block; margin-top: 6px; border: 0.5px solid; }

  /* Footer */
  .footer { text-align: center; margin-top: 3rem; font-size: 12px; color: var(--text3); }
  .footer a { color: var(--text2); text-decoration: none; }

  /* Responsive */
  @media (max-width: 600px) {
    .sec-tab { font-size: 11px; padding: 9px 3px; }
    .phase-hero { padding: 1rem; }
    .sec-body { padding: 1rem; }
  }
</style>

const sectionLabels = { concepts: "Concepts", resources: "Resources", practice: "Thực hành", milestones: "Milestones" };
let activePhase = 0;
let activeSections = [0, 0, 0, 0, 0];

function renderItems(items, mid) {
  return items.map(i => `
    <div class="item">
      <div class="dot" style="background:${mid}"></div>
      <div>
        <div class="item-title">${i.t}</div>
        ${i.s ? `<div class="item-sub">${i.s}</div>` : ''}
      </div>
    </div>`).join('');
}

function renderResources(items, color, mid) {
  return items.map((r, idx) => `
    <div class="res-row">
      <div class="res-num" style="background:${color}">${idx+1}</div>
      <div>
        <div class="res-title">${r.t}</div>
        <div class="res-how">${r.h}</div>
        <div class="res-why" style="color:${color}">${r.w}</div>
      </div>
    </div>`).join('');
}

function renderPractice(items, color, mid) {
  return items.map(p => `
    <div class="practice-block" style="border-color:${mid}">
      <div class="pb-freq" style="color:${color}">${p.freq}</div>
      <div class="pb-title">${p.t}</div>
      ${p.steps.map(s => `<div class="pb-step">${s}</div>`).join('')}
      ${p.ex ? `<div class="pb-ex">${p.ex}</div>` : ''}
    </div>`).join('');
}

function renderMilestones(items, color, mid) {
  return `<div class="timeline">${items.map(m => `
    <div class="tl-item">
      <div class="tl-dot" style="background:${mid};border-color:${color}"></div>
      <div class="tl-title">${m.t}</div>
      <div class="tl-desc">${m.d}</div>
      <div class="tl-gate" style="background:${mid}22;color:${color};border-color:${mid}">Gate: ${m.g}</div>
    </div>`).join('')}</div>`;
}

function renderAll() {
  // Progress
  const pb = document.getElementById('progress-track');
  pb.innerHTML = phases.map((p, i) =>
    `<div class="progress-seg" style="background:${i <= activePhase ? p.mid : 'var(--border)'}"></div>`
  ).join('');

  // Tabs
  const tabs = document.getElementById('phase-tabs');
  tabs.innerHTML = phases.map((p, i) => `
    <button class="phase-tab ${i === activePhase ? 'active' : ''}"
      style="${i === activePhase ? `background:${p.color};` : ''}"
      onclick="setPhase(${i})">${p.num}. ${p.label}</button>`
  ).join('');

  // Panels
  const panelsEl = document.getElementById('panels');
  panelsEl.innerHTML = phases.map((p, i) => {
    const sKeys = ['concepts', 'resources', 'practice', 'milestones'];
    const sec = activeSections[i];
    let content = '';
    if (sec === 0) content = renderItems(p.concepts, p.mid);
    else if (sec === 1) content = renderResources(p.resources, p.color, p.mid);
    else if (sec === 2) content = renderPractice(p.practice, p.color, p.mid);
    else if (sec === 3) content = renderMilestones(p.milestones, p.color, p.mid);

    return `
      <div class="phase-panel ${i === activePhase ? 'visible' : ''}" id="panel-${i}">
        <div class="phase-hero" style="background:${p.color};color:#fff">
          <div class="phase-num">Phase ${p.num} · ${p.duration}</div>
          <div class="phase-title">${p.title}</div>
          <div class="phase-transform">"${p.transform}"</div>
        </div>
        <div class="section-tabs">
          ${sKeys.map((k, j) => `
            <button class="sec-tab ${j === sec ? 'active' : ''}"
              onclick="setSection(${i}, ${j})">${sectionLabels[k]}</button>`
          ).join('')}
        </div>
        <div class="sec-body">${content}</div>
      </div>`;
  }).join('');
}

function setPhase(i) { activePhase = i; renderAll(); }
function setSection(phase, sec) { activeSections[phase] = sec; renderAll(); }

renderAll();
</script>
