<style>

    --bg: #07090D;
    --surface: #0F1218;
    --surface2: #171C24;
    --border: rgba(255,255,255,0.063);
    --border-hover: rgba(255,255,255,0.12);

  ::-webkit-scrollbar { width: 3px; height: 3px; }

  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.07); border-radius: 2px; }

  #header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }

  .header-label { font-family: var(--mono); font-size: 9px; color: var(--text-mut); letter-spacing: 0.18em; text-transform: uppercase; }
  .header-sep { width: 1px; height: 14px; background: var(--text-mut); }
  #total-label { font-family: var(--mono); font-size: 10px; color: var(--text-sec); }
  #total-bar { width: 80px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden; }
  #total-fill { height: 100%; border-radius: 1px; transition: width 0.4s; }

  #timeline { border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--bg); position: sticky; top: 48px; z-index: 99; }
  #timeline-inner { max-width: 940px; margin: 0 auto; padding: 0 2rem; display: flex; }
  .stage-tab { flex: 1; background: transparent; border: none; border-bottom: 2px solid transparent; padding: 14px 0 12px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: -1px; min-width: 140px; }
  .stage-tab:hover { background: rgba(255,255,255,0.018); }
  .stage-tab-time { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; }
  .stage-tab-name { font-size: 13px; }
  .stage-tab-dots { display: flex; justify-content: center; gap: 4px; margin-top: 7px; flex-wrap: wrap; max-width: 90px; margin-left: auto; margin-right: auto; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.07); flex-shrink: 0; transition: background 0.2s; }

  #main { max-width: 940px; margin: 0 auto; padding: 2rem; }

  #stage-header { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  #stage-header-left { flex: 1; min-width: 280px; }
  .stage-icon-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stage-icon { font-family: var(--mono); font-size: 28px; line-height: 1; }
  .stage-range { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; }
  .stage-name { font-size: 22px; font-weight: 500; color: var(--text); }
  .stage-sub { font-size: 13px; color: var(--text-sec); line-height: 1.7; margin-top: 8px; max-width: 560px; }
  #stage-prog-box { border-radius: 10px; padding: 1.1rem 1.5rem; text-align: center; min-width: 130px; flex-shrink: 0; }
  #stage-pct { font-family: var(--mono); font-size: 32px; font-weight: 500; line-height: 1; }
  #stage-count { font-family: var(--mono); font-size: 10px; color: var(--text-sec); margin-top: 4px; }
  #stage-prog-bar { height: 2px; background: rgba(255,255,255,0.05); border-radius: 1px; margin-top: 8px; overflow: hidden; }
  #stage-prog-fill { height: 100%; border-radius: 1px; transition: width 0.4s; }

  #inner-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; overflow-x: auto; }
  .inner-tab { background: none; border: none; border-bottom: 1.5px solid transparent; padding: 10px 18px; font-size: 13px; color: var(--text-sec); cursor: pointer; transition: all 0.15s; margin-bottom: -1px; white-space: nowrap; }
  .inner-tab:hover { color: var(--text); }
  .inner-tab.active { font-weight: 500; }

  .milestone-row { display: flex; gap: 12px; padding: 1rem 1.25rem; margin-bottom: 4px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; align-items: flex-start; }

  .check-box { width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,0.17); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }

  .checkpoint-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .checkpoint-body { font-size: 13px; color: var(--text-sec); line-height: 1.85; font-family: var(--serif); font-style: italic; }

  .pareto-intro { margin-bottom: 1.5rem; }

  .pareto-intro-text { font-size: 13px; color: var(--text-sec); line-height: 1.7; }
  .pareto-card { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: border-color 0.2s; }
  .pareto-card:hover { border-color: rgba(255,255,255,0.1); }
  .pareto-header { display: flex; align-items: center; gap: 16px; padding: 1.25rem 1.5rem; cursor: pointer; }
  .pareto-num { font-family: var(--mono); font-size: 28px; line-height: 1; opacity: 0.6; flex-shrink: 0; }
  .pareto-meta { flex: 1; }
  .pareto-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .pareto-unlock { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
  .pareto-time { font-family: var(--mono); font-size: 10px; color: var(--text-mut); flex-shrink: 0; }
  .pareto-chevron { flex-shrink: 0; transition: transform 0.2s; }
  .pareto-card.expanded .pareto-chevron { transform: rotate(180deg); }
  .pareto-body { display: none; padding: 0 1.5rem 1.5rem; border-top: 1px solid; }
  .pareto-card.expanded .pareto-body { display: block; padding-top: 1.25rem; }
  .pareto-text { font-size: 13px; color: var(--text-sec); line-height: 1.85; margin-bottom: 1.25rem; }
  .pareto-res-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mut); margin-bottom: 8px; }
  .pareto-res-item { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .pareto-res-arrow { font-size: 10px; margin-top: 3px; flex-shrink: 0; }
  .pareto-res-text { font-size: 13px; color: var(--text-sec); }

  #skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .skill-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .skill-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .skill-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .skill-arrow { font-size: 9px; margin-top: 4px; flex-shrink: 0; }
  .skill-text { font-size: 13px; color: var(--text-sec); line-height: 1.65; }

  .res-section { margin-bottom: 2rem; }
  .res-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-mut); margin-bottom: 1rem; }
  .res-book { display: flex; gap: 14px; padding: 1rem 1.25rem; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 10px; transition: all 0.15s; }
  .res-book:hover { background: rgba(255,255,255,0.025); border-color: var(--border-hover); }
  .res-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
  .res-book-info { flex: 1; }
  .res-book-title-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 5px; flex-wrap: wrap; }
  .res-book-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .res-book-author { font-size: 11px; color: var(--text-mut); }
  .res-priority { font-family: var(--mono); font-size: 9px; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.04); letter-spacing: 0.08em; }
  .res-book-why { font-size: 12px; color: var(--text-sec); line-height: 1.65; }
  .res-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
  .res-card { padding: 1rem 1.25rem; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 10px; transition: all 0.15s; }
  .res-card:hover { background: rgba(255,255,255,0.025); border-color: var(--border-hover); }
  .res-card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .res-card-why { font-size: 12px; color: var(--text-sec); line-height: 1.65; }
  .res-cert { display: flex; gap: 14px; padding: 1rem 1.25rem; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 10px; align-items: flex-start; transition: all 0.15s; }
  .res-cert:hover { background: rgba(255,255,255,0.025); border-color: var(--border-hover); }
  .res-cert-badge { font-family: var(--mono); font-size: 9px; padding: 4px 8px; border-radius: 5px; flex-shrink: 0; letter-spacing: 0.08em; margin-top: 2px; white-space: nowrap; }
  .res-cert-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .res-cert-why { font-size: 12px; color: var(--text-sec); line-height: 1.65; }

  .wisdom-main { padding: 2.5rem; border-radius: 16px; margin-bottom: 1.5rem; }
  .wisdom-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .wisdom-text { font-size: 17px; font-family: var(--serif); font-weight: 300; font-style: italic; color: var(--text); line-height: 1.95; }
  .wisdom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .wisdom-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .wisdom-card-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .wisdom-card-body { font-size: 13px; color: var(--text-sec); line-height: 1.75; }

  .panel { display: none; }
  .panel.active { display: block; }
  #footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .footer-text { font-family: var(--mono); font-size: 9px; color: var(--text-mut); }

  @media (max-width: 640px) {
    #skills-grid, .res-two-col, .wisdom-grid { grid-template-columns: 1fr; }
    .res-two-col { gap: 0; }
    #main, #header-inner, #timeline-inner { padding-left: 1.25rem; padding-right: 1.25rem; }
  }
</style>
</head>

<script>
const LS_KEY = 'finance_roadmap_v1';

const PARETO_CORES = [
  {
    id:'pc1', num:'01', title:'Macroeconomic Architecture', time:'4–5 tuần focused',
    unlock:'Bản đồ tổng thể của mọi thứ — không có cái này, mọi phân tích chỉ là context-free facts',
    body:'GDP và các components (C + I + G + NX): hiểu tại sao consumption chiếm 70% GDP Mỹ nhưng chỉ 38% Trung Quốc — và implications là gì. Money supply: M0, M1, M2 — tiền được tạo ra như thế nào (bank credit, không phải in tiền). Transmission mechanism: khi Fed tăng lãi suất, con đường từ rate → credit → spending → inflation mất bao lâu và qua những kênh nào. Inflation mechanics: demand-pull vs cost-push vs structural — tại sao 2021-2022 inflation khác 1970s inflation. Phillips Curve: tại sao trade-off thất nghiệp-lạm phát không ổn định. IS-LM framework đủ để tư duy chính sách ngắn hạn.',
    resources:['Macroeconomics — Gregory Mankiw (Part 3-5 là core, đọc kỹ, không skip)','Principles of Economics — N. Gregory Mankiw (nếu chưa có nền tảng)','Fed Education resources: federalreserveeducation.org — đọc mọi explainer','ECB/Fed/BOE research papers — đọc ít nhất 1 paper/tuần từ month 2']
  },
  {
    id:'pc2', num:'02', title:'The Credit & Debt Cycle', time:'3 tuần đọc + ongoing application',
    unlock:'1 framework giải thích 80% lịch sử kinh tế — và 80% cơ hội lớn trong investing hay policy',
    body:'Ray Dalio\'s template: nền kinh tế là tổng hợp của các credit transactions. Short-term debt cycle (5-8 năm): expansion → tightening → recession → easing. Long-term debt cycle (75-100 năm): debt accumulates until debt service exceeds income growth → deleveraging. 3 loại deleveraging: inflationary (Weimar), deflationary (Great Depression), "beautiful" (US 2008-2012). Tại sao 2008 không thành depression: Fed/Treasury actions và so sánh với 1930s policy errors. Minsky Moment: stability breeds instability — khi markets feel safe nhất là khi risk nhất. Shadow banking và credit creation ngoài ngân hàng truyền thống.',
    resources:['Principles for Navigating Big Debt Crises — Ray Dalio (PDF miễn phí tại bridgewater.com, đọc toàn bộ)','This Time Is Different — Reinhart & Rogoff (data từ 800 năm, transformative)','The Minsky Moment — đọc các academic papers về Hyman Minsky','Lords of Finance — Liaquat Ahamed (1929 crash, narrative + lesson)']
  },
  {
    id:'pc3', num:'03', title:'Financial Markets Structure', time:'4 tuần + continuous practice',
    unlock:'Ngôn ngữ của domain — không có cái này, bạn không đọc được thị trường hay communicate với practitioners',
    body:'Equity markets: price discovery, market microstructure, valuation frameworks (DCF, comps, precedent transactions), market cap vs enterprise value. Bond markets: yield curve (normal, inverted, flat), duration và convexity, credit spreads, yield curve inversion as recession predictor — tại sao? FX markets: purchasing power parity, interest rate parity, carry trade, reserve currency dynamics. Derivatives: options Greeks cơ bản (delta, gamma, vega), futures và hedging, credit default swaps (CDS) là gì và tại sao quan trọng trong 2008. Intermarket relationships: khi nào stocks và bonds tương quan dương, âm — và tại sao giai đoạn 2022 là rare.',
    resources:['Options, Futures, and Other Derivatives — John Hull (Chapters 1-10 là core)','The Intelligent Investor — Benjamin Graham (mental model cho valuation)','Bloomberg Terminal tutorials (nếu có access) hoặc Koyfin/Macrotrends miễn phí','Market Wizards series — Jack Schwager (cách practitioners thực sự nghĩ)']
  },
  {
    id:'pc4', num:'04', title:'Institutional Capital Flows', time:'3–4 tuần',
    unlock:'Hiểu ai di chuyển giá — 80% price action là do institutional flows, không phải retail sentiment',
    body:'Central banks: Fed balance sheet, reserve management, currency intervention, FX reserves. Sovereign Wealth Funds: Norway\'s GPFG, GIC Singapore, ADIA Abu Dhabi — investment mandates và constraints. Pension funds và endowments: liability-driven investing, Yale Model (Swensen), asset allocation frameworks. Hedge funds: long-short equity, global macro, quantitative strategies — cách từng strategy tạo alpha. Insurance companies: investment constraints từ liability matching, duration matching. Tại sao institutional constraints tạo ra persistent market inefficiencies mà individual investors có thể exploit. The Plumbing: repo market, prime brokerage, securities lending — tại sao repo market hiểu là đọc được financial stability.',

  },
  {
    id:'pc5', num:'05', title:'Economic History as Dataset', time:'Ongoing — 1 case study/tháng',
    unlock:'History là dataset duy nhất cho rare events — ai không biết lịch sử sẽ bị surprise bởi những thứ đã xảy ra trước',

const STAGES = [

    threshold:'Bạn hoàn thành Pareto Sprint khi: (1) Đọc được một Fed statement và giải thích implications cho markets trong 10 phút — không phải nhại lại mà là reason từ đó. (2) Nhìn yield curve inversion và giải thích cơ chế tại sao nó predict recession, với uncertainty bounds. (3) Tóm tắt debt cycle của một quốc gia trong một page — identify họ đang ở đâu trong cycle. (4) Đọc một crisis retrospective và identify ít nhất 3 warning signs mà analysts bỏ lỡ — và tại sao về mặt incentive và cognitive.',
    wisdom:'Finance và Economics là domain mà illusion of understanding cực kỳ nguy hiểm. Bạn có thể đọc 50 cuốn sách và vẫn không hiểu gì nếu đọc sai cách. Pareto Sprint này không phải về accumulate knowledge — mà về build 5 mental models đủ vững để bạn có thể reason về tình huống chưa gặp. Khác biệt giữa người thực sự hiểu và người chỉ nhớ là: người hiểu có thể nói "tôi không biết" đúng lúc và biết tại sao mình không biết.',

    podcasts:[
      {name:'CFR — Council on Foreign Relations Podcast', why:'Where policy and economics meet at the highest level'},
      {name:'Conversations with Tyler (Cowen)', why:'Breadth và depth — best intellectual podcast for economists and strategists'},
      {name:'Peterson Institute for International Economics', why:'Think tank level analysis — where policy is shaped'},
    ],
    reads:[
      {name:'Foreign Affairs — Economic issues', why:'Where the synthesis of economics, geopolitics, and policy happens at highest level'},
      {name:'Working papers: NBER, SSRN, IMF WP series', why:'Primary research trước khi nó becomes consensus — 2 năm ahead của mainstream'},
      {name:'BIS Annual Report', why:'Most comprehensive view của global financial system from the central bank of central banks'},
    ],
    certs:[
      {name:'PhD Economics — part-time hoặc executive', priority:'Highest signal', why:'Nếu muốn academic/policy path — the credential that opens the most important doors'},
      {name:'Think tank fellowship (Brookings, CFR, PIIE)', priority:'Competitive', why:'Research and network — được invited là signal bạn đã arrived ở một level nhất định'},
      {name:'IMF / World Bank / BIS internship or consulting', priority:'Competitive', why:'Inside the institutions — understand how global economic policy is actually made'},
    ],
  }
];

let checked = {};
let activeStage = 0;
let activeTab = 'milestones';
let expandedPareto = null;

function load() { try { const s = localStorage.getItem(LS_KEY); if(s) checked = JSON.parse(s); } catch{} }
function save() { try { localStorage.setItem(LS_KEY, JSON.stringify(checked)); } catch{} }
function totalProg() {
  let done=0, total=0;
  STAGES.forEach(s => { total += s.milestones.length; s.milestones.forEach((_,i) => { if(checked[s.id+'_'+i]) done++; }); });
  return {done, total};
}
function sPct(s) {
  const total = s.milestones.length;
  const done = s.milestones.filter((_,i) => checked[s.id+'_'+i]).length;
  return {done, total, pct: Math.round((done/total)*100)};
}

function renderTimeline() {
  const el = document.getElementById('timeline-inner');
  el.innerHTML = STAGES.map((s,i) => {
    const isA = i===activeStage;
    const dots = s.milestones.map((_,mi) => `<span class="dot" style="${checked[s.id+'_'+mi]?'background:'+s.accent:''}"></span>`).join('');
    return `<button class="stage-tab" onclick="setStage(${i})" style="border-bottom-color:${isA?s.accent:'transparent'}">
      <div class="stage-tab-time" style="color:${isA?s.accent:'var(--text-mut)'}">${s.range}</div>
      <div class="stage-tab-name" style="color:${isA?'var(--text)':'var(--text-sec)'};font-weight:${isA?500:400}">${s.phase}</div>
      <div class="stage-tab-dots">${dots}</div>
    </button>`;
  }).join('');
}

function renderHeader() {
  const p = totalProg();
  document.getElementById('total-label').textContent = p.done+'/'+p.total;
  const f = document.getElementById('total-fill');
  f.style.width = Math.round((p.done/p.total)*100)+'%';
  f.style.background = STAGES[activeStage].accent;
}

function renderStageHeader() {
  const s = STAGES[activeStage]; const p = sPct(s);
  document.getElementById('s-icon').textContent = s.icon;
  document.getElementById('s-icon').style.color = s.accent;
  document.getElementById('s-range').textContent = s.range;
  document.getElementById('s-range').style.color = s.accent;
  document.getElementById('s-name').textContent = s.phase;
  document.getElementById('s-sub').textContent = s.levelTarget;
  const box = document.getElementById('stage-prog-box');
  box.style.background = s.accentDim; box.style.border = '1px solid '+s.accentBorder;
  document.getElementById('stage-pct').textContent = p.pct+'%';
  document.getElementById('stage-pct').style.cssText = 'font-family:var(--mono);font-size:32px;font-weight:500;line-height:1;color:'+s.accent;
  document.getElementById('stage-count').textContent = p.done+'/'+p.total+' done';
  document.getElementById('stage-prog-fill').style.cssText = 'height:100%;border-radius:1px;width:'+p.pct+'%;background:'+s.accent+';transition:width 0.4s';
}

function renderInnerTabs() {
  const s = STAGES[activeStage];
  const tabs = activeStage===0 ? ['milestones','pareto','skills','resources','wisdom'] : ['milestones','skills','resources','wisdom'];
  const labels = {milestones:'Milestones',pareto:'Pareto 20%',skills:'Skills',resources:'Resources',wisdom:'Wisdom'};
  document.getElementById('inner-tabs').innerHTML = tabs.map(t =>
    `<button class="inner-tab${activeTab===t?' active':''}" onclick="setTab('${t}')"
      style="color:${activeTab===t?s.accent:'var(--text-sec)'};border-bottom-color:${activeTab===t?s.accent:'transparent'}">${labels[t]}</button>`
  ).join('');
}

function renderPanels() {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+activeTab).classList.add('active');
  const s = STAGES[activeStage];
  if(activeTab==='milestones') renderMilestones(s);
  if(activeTab==='pareto' && activeStage===0) renderPareto(s);
  if(activeTab==='skills') renderSkills(s);
  if(activeTab==='resources') renderResources(s);
  if(activeTab==='wisdom') renderWisdom(s);
}

function renderMilestones(s) {
  const rows = s.milestones.map((m,i) => {
    const done = !!checked[s.id+'_'+i];
    return `<div class="milestone-row${done?' done':''}" onclick="toggleCheck('${s.id}',${i})"
      style="${done?'border-color:'+s.accentBorder+';background:'+s.accentDim:''}">
      <div class="check-box" style="${done?'background:'+s.accent+';border-color:'+s.accent:''}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#07090D" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="milestone-content">
        <span class="milestone-week" style="color:${done?s.accent:'var(--text-mut)'}">${m.week}</span><span class="milestone-text">${m.text}</span>
      </div>
    </div>`;
  }).join('');
  document.getElementById('panel-milestones').innerHTML = rows +
    `<div class="checkpoint-block" style="border:1px solid ${s.accentBorder};background:${s.accentDim}">
      <div class="checkpoint-label" style="color:${s.accent}">Checkpoint — Dấu hiệu thực sự đạt mức này</div>
      <div class="checkpoint-body">${s.threshold}</div>
    </div>`;
}

function renderPareto(s) {
  const cards = PARETO_CORES.map(pc => {
    const exp = expandedPareto===pc.id;
    return `<div class="pareto-card${exp?' expanded':''}" id="card-${pc.id}">
      <div class="pareto-header" onclick="togglePareto('${pc.id}')">
        <span class="pareto-num" style="color:${s.accent}">${pc.num}</span>
        <div class="pareto-meta">
          <div class="pareto-title">${pc.title}</div>
          <div class="pareto-unlock">${pc.unlock}</div>
        </div>
        <span class="pareto-time">${pc.time}</span>
        <svg class="pareto-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5L7 9L11 5" stroke="var(--text-sec)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="pareto-body" style="border-top-color:${s.accentBorder}">
        <div class="pareto-text">${pc.body}</div>
        <div class="pareto-res-label">Resources cụ thể</div>
        ${pc.resources.map(r=>`<div class="pareto-res-item"><span class="pareto-res-arrow" style="color:${s.accent}">▸</span><span class="pareto-res-text">${r}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('panel-pareto').innerHTML =
    `<div class="pareto-intro">
      <div class="pareto-intro-label">5 load-bearing frameworks · Master tất cả trong 6 tháng đầu</div>
      <div class="pareto-intro-text">Đây là 20% kiến thức cho 80% năng lực phân tích. Không phải vì chúng đơn giản — mà vì chúng là lenses mà mọi analysis khác cần đến. Bỏ qua bất kỳ cái nào, bạn sẽ có blind spots nguy hiểm trong chính xác những tình huống quan trọng nhất.</div>
    </div>${cards}`;
}

function renderSkills(s) {
  document.getElementById('panel-skills').innerHTML =
    `<div id="skills-grid">${s.skills.map(sk=>`
      <div class="skill-card">
        <div class="skill-title" style="color:${s.accent}">${sk.title}</div>
        ${sk.items.map(it=>`<div class="skill-item"><span class="skill-arrow" style="color:${s.accent}">▸</span><span class="skill-text">${it}</span></div>`).join('')}
      </div>`).join('')}</div>`;
}

function renderResources(s) {
  const books = s.books.map(b=>`
    <div class="res-book">
      <div class="res-bar" style="background:${b.pcolor}"></div>
      <div class="res-book-info">
        <div class="res-book-title-row">
          <span class="res-book-title">${b.title}</span>
          <span class="res-book-author">— ${b.author}</span>
          <span class="res-priority" style="color:${b.pcolor}">${b.priority}</span>
        </div>
        <div class="res-book-why">${b.why}</div>
      </div>
    </div>`).join('');
  const pods = s.podcasts.map(p=>`<div class="res-card"><div class="res-card-name">${p.name}</div><div class="res-card-why">${p.why}</div></div>`).join('');
  const reads = s.reads.map(r=>`<div class="res-card"><div class="res-card-name">${r.name}</div><div class="res-card-why">${r.why}</div></div>`).join('');
  const certs = s.certs.map(c=>`
    <div class="res-cert">
      <div class="res-cert-badge" style="color:${s.accent};background:${s.accentDim};border:1px solid ${s.accentBorder}">${c.priority}</div>
      <div><div class="res-cert-name">${c.name}</div><div class="res-cert-why">${c.why}</div></div>
    </div>`).join('');
  document.getElementById('panel-resources').innerHTML =
    `<div class="res-section"><div class="res-section-label">Sách</div>${books}</div>
    <div class="res-two-col">
      <div><div class="res-section-label">Podcast & Audio</div>${pods}</div>
      <div><div class="res-section-label">Newsletters & Reading</div>${reads}</div>
    </div>
    <div class="res-section"><div class="res-section-label">Certifications & Programs</div>${certs}</div>`;
}

function renderWisdom(s) {
  const cards = s.wisdomCards.map(w=>`
    <div class="wisdom-card">
      <div class="wisdom-card-title" style="color:${s.accent}">${w.title}</div>
      <div class="wisdom-card-body">${w.body}</div>
    </div>`).join('');
  document.getElementById('panel-wisdom').innerHTML =
    `<div class="wisdom-main" style="border:1px solid ${s.accentBorder};background:${s.accentDim}">
      <div class="wisdom-label" style="color:${s.accent}">Core Wisdom — ${s.phase}</div>
      <div class="wisdom-text">${s.wisdom}</div>
    </div>
    <div class="wisdom-grid">${cards}</div>`;
}

function renderFooter() {
  const p = totalProg();
  document.getElementById('footer-left').textContent = 'Progress tự động lưu · '+p.done+'/'+p.total+' milestones hoàn thành';
}

function render() {
  renderHeader(); renderTimeline(); renderStageHeader();
  renderInnerTabs(); renderPanels(); renderFooter();
}

function setStage(i) { activeStage=i; activeTab='milestones'; expandedPareto=null; render(); }
function setTab(t) { activeTab=t; render(); }
function toggleCheck(sid, idx) { const k=sid+'_'+idx; checked[k]=!checked[k]; save(); render(); }
function togglePareto(id) { expandedPareto = expandedPareto===id?null:id; renderPanels(); }

load(); render();
</script>
</body>
</html>
