<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTech Product Builder · Roadmap · Tran Phat Hung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Serif:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080A0E;
    --surface: #111318;
    --surface2: #191D24;
    --border: rgba(255,255,255,0.065);
    --border-hover: rgba(255,255,255,0.13);
    --text: #EEE9E0;
    --text-sec: #7A7870;
    --text-mut: #3D3C38;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --serif: 'IBM Plex Serif', Georgia, serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; font-size: 14px; line-height: 1.6; }
  button { cursor: pointer; font-family: var(--sans); border: none; background: none; }
  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  /* HEADER */
  #header { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
  #header-inner { max-width: 920px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 48px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-label { font-family: var(--mono); font-size: 9px; color: var(--text-mut); letter-spacing: 0.18em; text-transform: uppercase; }
  .header-sep { width: 1px; height: 14px; background: var(--text-mut); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  #total-label { font-family: var(--mono); font-size: 10px; color: var(--text-sec); }
  #total-bar { width: 80px; height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; overflow: hidden; }
  #total-fill { height: 100%; border-radius: 1px; transition: width 0.4s; }

  /* TIMELINE NAV */
  #timeline { border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--bg); position: sticky; top: 48px; z-index: 99; }
  #timeline-inner { max-width: 920px; margin: 0 auto; padding: 0 2rem; display: flex; }
  .stage-tab { flex: 1; background: transparent; border: none; border-bottom: 2px solid transparent; padding: 14px 0 12px; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: -1px; min-width: 140px; }
  .stage-tab:hover { background: rgba(255,255,255,0.02); }
  .stage-tab.active { background: transparent; }
  .stage-tab-time { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 4px; transition: color 0.2s; }
  .stage-tab-name { font-size: 13px; transition: color 0.2s; }
  .stage-tab-dots { display: flex; justify-content: center; gap: 4px; margin-top: 7px; flex-wrap: wrap; max-width: 80px; margin-left: auto; margin-right: auto; }
  .dot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.08); transition: background 0.2s; flex-shrink: 0; }
  .dot.done { }

  /* MAIN */
  #main { max-width: 920px; margin: 0 auto; padding: 2rem; }

  /* STAGE HEADER */
  #stage-header { display: flex; gap: 24px; align-items: flex-start; margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  #stage-header-left { flex: 1; min-width: 280px; }
  .stage-icon-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .stage-icon { font-family: var(--mono); font-size: 28px; line-height: 1; }
  .stage-icon-meta { }
  .stage-range { font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 2px; }
  .stage-name { font-size: 22px; font-weight: 500; color: var(--text); }
  .stage-sub { font-size: 13px; color: var(--text-sec); line-height: 1.7; margin-top: 8px; max-width: 560px; }
  #stage-prog-box { border-radius: 10px; padding: 1.1rem 1.5rem; text-align: center; min-width: 130px; flex-shrink: 0; }
  #stage-pct { font-family: var(--mono); font-size: 32px; font-weight: 500; line-height: 1; }
  #stage-count { font-family: var(--mono); font-size: 10px; color: var(--text-sec); margin-top: 4px; }
  #stage-prog-bar { height: 2px; background: rgba(255,255,255,0.06); border-radius: 1px; margin-top: 8px; overflow: hidden; }
  #stage-prog-fill { height: 100%; border-radius: 1px; transition: width 0.4s; }

  /* INNER TABS */
  #inner-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 2rem; overflow-x: auto; }
  .inner-tab { background: none; border: none; border-bottom: 1.5px solid transparent; padding: 10px 18px; font-size: 13px; font-weight: 400; color: var(--text-sec); cursor: pointer; transition: all 0.15s; margin-bottom: -1px; white-space: nowrap; }
  .inner-tab:hover { color: var(--text); }
  .inner-tab.active { font-weight: 500; }

  /* MILESTONES */
  .milestone-row { display: flex; gap: 12px; padding: 1rem 1.25rem; margin-bottom: 4px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; transition: all 0.2s; align-items: flex-start; }
  .milestone-row:hover { background: rgba(255,255,255,0.025); }
  .milestone-row.done { }
  .check-box { width: 20px; height: 20px; border: 1.5px solid rgba(255,255,255,0.18); border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.15s; }
  .check-box svg { display: none; }
  .milestone-row.done .check-box svg { display: block; }
  .milestone-content { flex: 1; }
  .milestone-week { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; background: var(--surface2); padding: 2px 6px; border-radius: 4px; margin-right: 8px; }
  .milestone-text { font-size: 14px; color: var(--text-sec); line-height: 1.6; }
  .milestone-row.done .milestone-text { color: var(--text); }

  /* CHECKPOINT */
  .checkpoint-block { margin-top: 2rem; padding: 1.5rem; border-radius: 12px; }
  .checkpoint-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
  .checkpoint-body { font-size: 13px; color: var(--text-sec); line-height: 1.85; font-family: var(--serif); font-style: italic; }

  /* PARETO */
  .pareto-card { border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; transition: all 0.2s; }
  .pareto-card:hover { border-color: rgba(255,255,255,0.11); }
  .pareto-header { display: flex; align-items: center; gap: 16px; padding: 1.25rem 1.5rem; cursor: pointer; }
  .pareto-num { font-family: var(--mono); font-size: 28px; line-height: 1; opacity: 0.6; flex-shrink: 0; }
  .pareto-meta { flex: 1; }
  .pareto-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
  .pareto-unlock { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
  .pareto-time { font-family: var(--mono); font-size: 10px; color: var(--text-mut); flex-shrink: 0; }
  .pareto-chevron { flex-shrink: 0; transition: transform 0.2s; }
  .pareto-card.expanded .pareto-chevron { transform: rotate(180deg); }
  .pareto-body { display: none; padding: 0 1.5rem 1.5rem; border-top: 1px solid; }
  .pareto-card.expanded .pareto-body { display: block; padding-top: 1.25rem; }
  .pareto-text { font-size: 13px; color: var(--text-sec); line-height: 1.85; margin-bottom: 1.25rem; }
  .pareto-res-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mut); margin-bottom: 8px; }
  .pareto-res-item { display: flex; gap: 8px; margin-bottom: 6px; align-items: flex-start; }
  .pareto-res-arrow { font-size: 10px; margin-top: 3px; flex-shrink: 0; }
  .pareto-res-text { font-size: 13px; color: var(--text-sec); }

  /* SKILLS */
  #skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .skill-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .skill-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; }
  .skill-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
  .skill-arrow { font-size: 9px; margin-top: 4px; flex-shrink: 0; }
  .skill-text { font-size: 13px; color: var(--text-sec); line-height: 1.65; }

  /* RESOURCES */
  .res-section-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--text-mut); margin-bottom: 1rem; }
  .res-section { margin-bottom: 2rem; }
  .res-book { display: flex; gap: 14px; padding: 1rem 1.25rem; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 10px; transition: all 0.15s; }
  .res-book:hover { background: rgba(255,255,255,0.03); border-color: var(--border-hover); }
  .res-bar { width: 3px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
  .res-book-info { flex: 1; }
  .res-book-title-row { display: flex; gap: 8px; align-items: baseline; margin-bottom: 5px; flex-wrap: wrap; }
  .res-book-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .res-book-author { font-size: 11px; color: var(--text-mut); }
  .res-priority { font-family: var(--mono); font-size: 9px; padding: 1px 6px; border-radius: 4px; background: rgba(255,255,255,0.05); letter-spacing: 0.08em; }
  .res-book-why { font-size: 12px; color: var(--text-sec); line-height: 1.65; }
  .res-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
  .res-card { padding: 1rem 1.25rem; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 10px; transition: all 0.15s; }
  .res-card:hover { background: rgba(255,255,255,0.03); border-color: var(--border-hover); }
  .res-card-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .res-card-why { font-size: 12px; color: var(--text-sec); line-height: 1.65; }
  .res-cert { display: flex; gap: 14px; padding: 1rem 1.25rem; margin-bottom: 6px; border: 1px solid var(--border); border-radius: 10px; align-items: flex-start; transition: all 0.15s; }
  .res-cert:hover { background: rgba(255,255,255,0.03); border-color: var(--border-hover); }
  .res-cert-badge { font-family: var(--mono); font-size: 9px; padding: 4px 8px; border-radius: 5px; flex-shrink: 0; letter-spacing: 0.08em; margin-top: 2px; white-space: nowrap; }
  .res-cert-name { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
  .res-cert-why { font-size: 12px; color: var(--text-sec); line-height: 1.65; }

  /* WISDOM */
  .wisdom-main { padding: 2.5rem; border-radius: 16px; margin-bottom: 1.5rem; }
  .wisdom-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 1.5rem; }
  .wisdom-text { font-size: 17px; font-family: var(--serif); font-weight: 300; font-style: italic; color: var(--text); line-height: 1.95; }
  .wisdom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .wisdom-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem 1.5rem; }
  .wisdom-card-title { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
  .wisdom-card-body { font-size: 13px; color: var(--text-sec); line-height: 1.75; }

  /* FOOTER */
  #footer { margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .footer-text { font-family: var(--mono); font-size: 9px; color: var(--text-mut); letter-spacing: 0.08em; }

  /* PANELS */
  .panel { display: none; }
  .panel.active { display: block; }

  /* PARETO INTRO */
  .pareto-intro { margin-bottom: 1.5rem; }
  .pareto-intro-label { font-family: var(--mono); font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-mut); margin-bottom: 8px; }
  .pareto-intro-text { font-size: 13px; color: var(--text-sec); line-height: 1.7; }

  @media (max-width: 640px) {
    #skills-grid { grid-template-columns: 1fr; }
    .res-two-col { grid-template-columns: 1fr; gap: 0; }
    .wisdom-grid { grid-template-columns: 1fr; }
    #main { padding: 1.25rem; }
    #header-inner { padding: 0 1.25rem; }
    #timeline-inner { padding: 0 1.25rem; }
  }
</style>
</head>

<div id="header">
  <div id="header-inner">

// STATE
let checked = {};
let activeStage = 0;
let activeTab = 'milestones';
let expandedPareto = null;

function loadChecked() {
  try { const s = localStorage.getItem(LS_KEY); if(s) checked = JSON.parse(s); } catch{}
}
function saveChecked() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(checked)); } catch{}
}

function totalProgress() {
  let done = 0, total = 0;
  STAGES.forEach(s => {
    total += s.milestones.length;
    s.milestones.forEach((_,i) => { if(checked[s.id+'_'+i]) done++; });
  });
  return {done, total};
}

function stagePct(s) {
  const total = s.milestones.length;
  const done = s.milestones.filter((_,i) => checked[s.id+'_'+i]).length;
  return {done, total, pct: Math.round((done/total)*100)};
}

function hex(color, alpha) {
  return color; // already valid
}

    const dots = s.milestones.map((_,mi) => {
      const done = !!checked[s.id+'_'+mi];
      return `<span class="dot${done?' done':''}" style="${done?'background:'+s.accent:''}"></span>`;
    }).join('');
    return `<button class="stage-tab${isActive?' active':''}" onclick="setStage(${i})" style="border-bottom-color:${isActive?s.accent:'transparent'}">
      <div class="stage-tab-time" style="color:${isActive?s.accent:'var(--text-mut)'}">${s.range}</div>
      <div class="stage-tab-name" style="color:${isActive?'var(--text)':'var(--text-sec)'}; font-weight:${isActive?500:400}">${s.phase}</div>
      <div class="stage-tab-dots">${dots}</div>
    </button>`;
  }).join('');
}

function renderStageHeader() {
  const s = STAGES[activeStage];
  const pr = stagePct(s);
  document.getElementById('s-icon').textContent = s.icon;
  document.getElementById('s-icon').style.color = s.accent;
  document.getElementById('s-range').textContent = s.range;
  document.getElementById('s-range').style.color = s.accent;
  document.getElementById('s-name').textContent = s.phase;
  document.getElementById('s-sub').textContent = s.levelTarget;
  document.getElementById('s-sub').style.color = 'var(--text-sec)';
  const box = document.getElementById('stage-prog-box');
  box.style.background = s.accentDim;
  box.style.border = '1px solid '+s.accentBorder;
  document.getElementById('stage-pct').textContent = pr.pct+'%';
  document.getElementById('stage-pct').style.color = s.accent;
  document.getElementById('stage-count').textContent = pr.done+'/'+pr.total+' done';
  document.getElementById('stage-prog-fill').style.width = pr.pct+'%';
  document.getElementById('stage-prog-fill').style.background = s.accent;
}

function renderInnerTabs() {
  const s = STAGES[activeStage];
  const tabs = activeStage === 0
    ? ['milestones','pareto','skills','resources','wisdom']
    : ['milestones','skills','resources','wisdom'];
  const labels = {milestones:'Milestones', pareto:'Pareto 20%', skills:'Skills', resources:'Resources', wisdom:'Wisdom'};
  document.getElementById('inner-tabs').innerHTML = tabs.map(t =>
    `<button class="inner-tab${activeTab===t?' active':''}" onclick="setTab('${t}')"
      style="color:${activeTab===t?s.accent:'var(--text-sec)'}; border-bottom-color:${activeTab===t?s.accent:'transparent'}">${labels[t]}</button>`
  ).join('');
}

function renderPanels() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+activeTab).classList.add('active');
  const s = STAGES[activeStage];

  if(activeTab === 'milestones') renderMilestones(s);
  if(activeTab === 'pareto' && activeStage === 0) renderPareto(s);
  if(activeTab === 'skills') renderSkills(s);
  if(activeTab === 'resources') renderResources(s);
  if(activeTab === 'wisdom') renderWisdom(s);
}

function renderMilestones(s) {
  const el = document.getElementById('panel-milestones');
  const rows = s.milestones.map((m,i) => {
    const k = s.id+'_'+i;
    const done = !!checked[k];
    return `<div class="milestone-row${done?' done':''}" onclick="toggleCheck('${s.id}',${i})"
      style="${done?'border-color:'+s.accentBorder+';background:'+s.accentDim:''}">
      <div class="check-box" style="${done?'background:'+s.accent+';border-color:'+s.accent:''}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#080A0E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="milestone-content">
        <span class="milestone-week" style="color:${done?s.accent:'var(--text-mut)'}">${m.week}</span><span class="milestone-text">${m.text}</span>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = rows + `
    <div class="checkpoint-block" style="border:1px solid ${s.accentBorder};background:${s.accentDim}">
      <div class="checkpoint-label" style="color:${s.accent}">Checkpoint — Dấu hiệu thực sự đạt mức này</div>
      <div class="checkpoint-body">${s.threshold}</div>
    </div>`;
}

function renderPareto(s) {
  const el = document.getElementById('panel-pareto');
  const cards = PARETO_CORES.map(pc => {
    const expanded = expandedPareto === pc.id;
    const res = pc.resources.map(r =>
      `<div class="pareto-res-item"><span class="pareto-res-arrow" style="color:${s.accent}">▸</span><span class="pareto-res-text">${r}</span></div>`
    ).join('');
    return `<div class="pareto-card${expanded?' expanded':''}" id="card-${pc.id}">
      <div class="pareto-header" onclick="togglePareto('${pc.id}')">
        <span class="pareto-num" style="color:${s.accent}">${pc.num}</span>
        <div class="pareto-meta">
          <div class="pareto-title">${pc.title}</div>
          <div class="pareto-unlock">${pc.unlock}</div>
        </div>
        <span class="pareto-time">${pc.time}</span>
        <svg class="pareto-chevron" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 5L7 9L11 5" stroke="var(--text-sec)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="pareto-body" style="border-top-color:${s.accentBorder}">
        <div class="pareto-text">${pc.body}</div>
        <div class="pareto-res-label">Resources cụ thể</div>
        ${res}
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div class="pareto-intro">
    <div class="pareto-intro-label">5 load-bearing concepts · Master tất cả trong 6 tháng</div>
    <div class="pareto-intro-text">Đây là 20% kiến thức cho 80% kết quả. Không phải vì chúng đơn giản — mà vì chúng là nền tảng mà mọi thứ khác build trên đó. Bỏ qua bất kỳ cái nào, toàn bộ cấu trúc trên sẽ không vững.</div>
  </div>${cards}`;
}

function renderSkills(s) {
  const el = document.getElementById('panel-skills');
  el.innerHTML = `<div id="skills-grid">${s.skills.map(sk => `
    <div class="skill-card">
      <div class="skill-title" style="color:${s.accent}">${sk.title}</div>
      ${sk.items.map(it => `<div class="skill-item"><span class="skill-arrow" style="color:${s.accent}">▸</span><span class="skill-text">${it}</span></div>`).join('')}
    </div>`).join('')}</div>`;
}

function renderResources(s) {
  const el = document.getElementById('panel-resources');
  const books = s.books.map(b => `
    <div class="res-book">
      <div class="res-bar" style="background:${b.pcolor}"></div>
      <div class="res-book-info">
        <div class="res-book-title-row">
          <span class="res-book-title">${b.title}</span>
          <span class="res-book-author">— ${b.author}</span>
          <span class="res-priority" style="color:${b.pcolor}">${b.priority}</span>
        </div>
        <div class="res-book-why">${b.why}</div>
      </div>
    </div>`).join('');

  const pods = s.podcasts.map(p => `<div class="res-card"><div class="res-card-name">${p.name}</div><div class="res-card-why">${p.why}</div></div>`).join('');
  const reads = s.reads.map(r => `<div class="res-card"><div class="res-card-name">${r.name}</div><div class="res-card-why">${r.why}</div></div>`).join('');
  const certs = s.certs.map(c => `
    <div class="res-cert">
      <div class="res-cert-badge" style="color:${s.accent};background:${s.accentDim};border:1px solid ${s.accentBorder}">${c.priority}</div>
      <div><div class="res-cert-name">${c.name}</div><div class="res-cert-why">${c.why}</div></div>
    </div>`).join('');

  el.innerHTML = `
    <div class="res-section"><div class="res-section-label">Sách</div>${books}</div>
    <div class="res-two-col">
      <div><div class="res-section-label">Podcast</div>${pods}</div>
      <div><div class="res-section-label">Newsletters & Reading</div>${reads}</div>
    </div>
    <div class="res-section"><div class="res-section-label">Certifications & Programs</div>${certs}</div>`;
}

function renderWisdom(s) {
  const el = document.getElementById('panel-wisdom');
  const cards = s.wisdomCards.map(w => `
    <div class="wisdom-card">
      <div class="wisdom-card-title" style="color:${s.accent}">${w.title}</div>
      <div class="wisdom-card-body">${w.body}</div>
    </div>`).join('');
  el.innerHTML = `
    <div class="wisdom-main" style="border:1px solid ${s.accentBorder};background:${s.accentDim}">
      <div class="wisdom-label" style="color:${s.accent}">Core Wisdom — ${s.phase}</div>
      <div class="wisdom-text">${s.wisdom}</div>
    </div>
    <div class="wisdom-grid">${cards}</div>`;
}

function renderHeader() {
  const p = totalProgress();
  document.getElementById('total-label').textContent = p.done+'/'+p.total;
  const fill = document.getElementById('total-fill');
  fill.style.width = Math.round((p.done/p.total)*100)+'%';
  fill.style.background = STAGES[activeStage].accent;
}

function renderFooter() {
  const p = totalProgress();
  document.getElementById('footer-left').textContent = 'Progress tự động lưu · '+p.done+'/'+p.total+' milestones hoàn thành';
}

function render() {
  renderHeader();
  renderTimeline();
  renderStageHeader();
  renderInnerTabs();
  renderPanels();
  renderFooter();
}

// ACTIONS
function setStage(i) {
  activeStage = i;
  activeTab = 'milestones';
  expandedPareto = null;
  render();
}

function setTab(t) {
  activeTab = t;
  render();
}

function toggleCheck(stageId, idx) {
  const k = stageId+'_'+idx;
  checked[k] = !checked[k];
  saveChecked();
  render();
}

function togglePareto(id) {
  expandedPareto = expandedPareto === id ? null : id;
  renderPanels();
}

// INIT
loadChecked();
render();
</script>
</body>
</html>
