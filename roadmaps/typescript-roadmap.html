<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeScript Mastery Roadmap — Top 1%</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e2a;
    --bg4: #222736;
    --surface: #1e2333;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --ts: #3178C6;
    --ts-light: #5b9bd9;
    --ts-dim: rgba(49,120,198,0.12);
    --ts-dim2: rgba(49,120,198,0.22);
    --text: #e8eaf0;
    --text2: #9199b0;
    --text3: #5a6180;
    --green: #1D9E75;
    --green-dim: rgba(29,158,117,0.15);
    --amber: #EF9F27;
    --amber-dim: rgba(239,159,39,0.12);
    --red: #E24B4A;
    --red-dim: rgba(226,75,74,0.12);
    --purple: #7F77DD;
    --purple-dim: rgba(127,119,221,0.12);
    --coral: #D85A30;
    --coral-dim: rgba(216,90,48,0.12);
    --mono: 'DM Mono', monospace;
    --sans: 'Sora', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

  /* ── LAYOUT ── */
  .shell {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    padding: 32px 0;
  }

  .sidebar-brand {
    padding: 0 24px 28px;
    border-bottom: 1px solid var(--border);
  }

  .brand-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--ts);
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .brand-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .sidebar-progress {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 8px;
    font-family: var(--mono);
  }

  .progress-label span:last-child { color: var(--ts-light); }

  .progress-track {
    height: 3px;
    background: var(--bg4);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--ts), var(--ts-light));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .sidebar-nav {
    padding: 16px 0;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 24px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: var(--text2);
    font-size: 13px;
  }

  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--ts-dim); color: var(--ts-light); }

  .nav-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
    transition: background 0.2s;
  }

  .nav-item.done .nav-dot { background: var(--green); border-color: var(--green); }
  .nav-item.active .nav-dot { background: var(--ts); border-color: var(--ts); }

  .nav-phase-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-left: auto;
  }

  .sidebar-footer {
    padding: 20px 24px;
    border-top: 1px solid var(--border);
  }

  .reset-btn {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }

  .reset-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── MAIN ── */
  .main {
    padding: 60px 72px;
    max-width: 860px;
  }

  /* ── PAGE HEADER ── */
  .page-header {
    margin-bottom: 56px;
  }

  .page-header-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--ts);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .page-header h1 {
    font-size: 36px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 16px;
    letter-spacing: -0.02em;
  }

  .page-header h1 em {
    font-style: normal;
    color: var(--ts-light);
  }

  .page-header-desc {
    font-size: 15px;
    color: var(--text2);
    max-width: 540px;
    line-height: 1.7;
  }

  .header-meta {
    display: flex;
    gap: 20px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .meta-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    background: var(--bg3);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 20px;
  }

  .meta-chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* ── PHASE CARD ── */
  .phase-card {
    margin-bottom: 20px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--bg2);
    overflow: hidden;
    transition: border-color 0.2s;
    scroll-margin-top: 32px;
  }

  .phase-card:hover { border-color: var(--border2); }
  .phase-card.is-active { border-color: rgba(49,120,198,0.3); }

  .phase-header {
    padding: 22px 28px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: background 0.15s;
  }

  .phase-header:hover { background: var(--bg3); }

  .phase-number {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
    width: 28px;
    flex-shrink: 0;
  }

  .phase-header-info { flex: 1; min-width: 0; }

  .phase-badges {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 5px;
  }

  .phase-badge {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    padding: 2px 9px;
    border-radius: 20px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .phase-duration {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
  }

  .phase-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .phase-subtitle {
    font-size: 12px;
    color: var(--text3);
    margin-top: 2px;
  }

  .phase-chevron {
    color: var(--text3);
    font-size: 11px;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .phase-chevron.open { transform: rotate(90deg); }

  .phase-body {
    display: none;
    border-top: 1px solid var(--border);
  }

  .phase-body.open { display: block; }

  /* ── TRANSFORMATION BOX ── */
  .transform-box {
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .transform-icon {
    font-size: 14px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .transform-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text2);
  }

  .transform-text strong {
    font-weight: 500;
    color: var(--text);
  }

  /* ── SECTION TABS ── */
  .section-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 0 28px;
  }

  .section-tab {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.04em;
    padding: 12px 14px;
    cursor: pointer;
    color: var(--text3);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    text-transform: uppercase;
    transition: color 0.15s;
  }

  .section-tab:hover { color: var(--text2); }
  .section-tab.active { color: var(--text); border-bottom-color: var(--ts); }

  .section-content { display: none; padding: 22px 28px; }
  .section-content.active { display: block; }

  /* ── CONCEPTS ── */
  .concept-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }

  .concept-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .concept-item:hover { border-color: var(--border2); background: var(--bg4); }
  .concept-item.checked { border-color: rgba(29,158,117,0.3); background: rgba(29,158,117,0.06); }

  .concept-check {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--text3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .concept-item.checked .concept-check {
    background: var(--green);
    border-color: var(--green);
  }

  .concept-check::after {
    content: '';
    display: none;
    width: 5px;
    height: 8px;
    border: 1.5px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .concept-item.checked .concept-check::after { display: block; }

  .concept-label {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.4;
  }

  .concept-item.checked .concept-label { color: var(--text3); text-decoration: line-through; }

  .concept-level {
    font-family: var(--mono);
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 3px;
    margin-left: auto;
    flex-shrink: 0;
  }

  .level-hard { background: var(--amber-dim); color: var(--amber); }
  .level-boss { background: var(--red-dim); color: var(--red); }

  /* ── RESOURCES ── */
  .resource-list { display: flex; flex-direction: column; gap: 10px; }

  .resource-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .resource-item:hover { border-color: var(--border2); }
  .resource-item.checked { opacity: 0.5; }

  .resource-check {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid var(--text3);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .resource-item.checked .resource-check {
    background: var(--green);
    border-color: var(--green);
  }

  .resource-check::after {
    content: '';
    display: none;
    width: 5px;
    height: 8px;
    border: 1.5px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .resource-item.checked .resource-check::after { display: block; }

  .resource-info { flex: 1; }

  .resource-type-badge {
    font-family: var(--mono);
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
  }

  .rtype-book { background: rgba(49,120,198,0.15); color: var(--ts-light); }
  .rtype-video { background: rgba(29,158,117,0.15); color: #2bbd8e; }
  .rtype-repo { background: var(--amber-dim); color: var(--amber); }
  .rtype-read { background: var(--bg4); color: var(--text3); }

  .resource-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .resource-item.checked .resource-text { text-decoration: line-through; color: var(--text3); }

  /* ── EXERCISES ── */
  .exercise-list { display: flex; flex-direction: column; gap: 10px; }

  .exercise-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
    padding: 14px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    transition: all 0.15s;
  }

  .exercise-item:hover { border-color: var(--border2); }
  .exercise-item.checked { border-color: rgba(29,158,117,0.2); background: rgba(29,158,117,0.04); }

  .ex-check {
    width: 20px;
    height: 20px;
    border-radius: 6px;
    border: 1.5px solid var(--text3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    margin-top: 1px;
  }

  .exercise-item.checked .ex-check {
    background: var(--green);
    border-color: var(--green);
  }

  .ex-check::after {
    content: '';
    display: none;
    width: 6px;
    height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translate(-1px, -2px);
  }

  .exercise-item.checked .ex-check::after { display: block; }

  .ex-body { flex: 1; }

  .ex-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 2px;
  }

  .ex-text {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }

  .exercise-item.checked .ex-text { text-decoration: line-through; color: var(--text3); }

  .ex-note {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ts-light);
    margin-top: 4px;
  }

  /* ── MILESTONE ── */
  .milestone-section { display: flex; flex-direction: column; gap: 16px; }

  .milestone-gate {
    border: 1px solid rgba(49,120,198,0.25);
    border-radius: 10px;
    padding: 18px 20px;
    background: var(--ts-dim);
  }

  .milestone-gate-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ts-light);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .milestone-gate-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
  }

  .milestone-gate-desc {
    font-size: 12px;
    color: var(--text2);
    line-height: 1.65;
  }

  .milestone-progress-section { }

  .milestone-progress-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 12px;
  }

  .milestone-progress-label span:first-child { color: var(--text3); }
  .milestone-progress-label span:last-child { font-family: var(--mono); font-size: 11px; }

  .milestone-track {
    height: 6px;
    background: var(--bg4);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }

  .milestone-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .milestone-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text3);
  }

  .mark-done-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    width: fit-content;
  }

  .mark-done-btn:hover { border-color: var(--green); color: var(--green); }
  .mark-done-btn.done { background: var(--green-dim); border-color: rgba(29,158,117,0.3); color: var(--green); }

  /* ── PHASE COMPLETE BANNER ── */
  .phase-complete-banner {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px 20px;
    background: var(--green-dim);
    border-top: 1px solid rgba(29,158,117,0.2);
    font-size: 12px;
    color: #2bbd8e;
    font-family: var(--mono);
  }

  .phase-complete-banner.visible { display: flex; }

  /* ── RESPONSIVE ── */
  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 32px 24px; }
    .page-header h1 { font-size: 26px; }
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .phase-card { animation: fadeIn 0.3s ease both; }
  .phase-card:nth-child(1) { animation-delay: 0.05s; }
  .phase-card:nth-child(2) { animation-delay: 0.1s; }
  .phase-card:nth-child(3) { animation-delay: 0.15s; }
  .phase-card:nth-child(4) { animation-delay: 0.2s; }
  .phase-card:nth-child(5) { animation-delay: 0.25s; }
  .phase-card:nth-child(6) { animation-delay: 0.3s; }
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-label">// roadmap</div>
      <div class="brand-title">TypeScript<br>Mastery — Top 1%</div>
    </div>

    <div class="sidebar-progress">
      <div class="progress-label">
        <span>Overall progress</span>
        <span id="overall-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="overall-bar" style="width:0%"></div>
      </div>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-footer">
      <button class="reset-btn" onclick="confirmReset()">↺ Reset all progress</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="page-header">
      <div class="page-header-eyebrow">// typescript · mastery roadmap</div>
      <h1>Road to <em>top 1%</em><br>TypeScript dev</h1>
      <p class="page-header-desc">6 phases. Mỗi phase là một irreversible transformation — không phải thêm syntax, mà thay đổi cách bạn nhìn problems.</p>
      <div class="header-meta">
        <div class="meta-chip"><div class="meta-chip-dot" style="background:#3178C6"></div>6 phases</div>
        <div class="meta-chip"><div class="meta-chip-dot" style="background:#1D9E75"></div>12–18 tháng</div>
        <div class="meta-chip"><div class="meta-chip-dot" style="background:#EF9F27"></div>Checklist persisted locally</div>
      </div>
    </div>

    <div id="phases-root"></div>
  </main>
</div>

<script>
const PHASES = [
  {
    id: 1,
    badge: "Phase 1",
    badgeColor: "rgba(49,120,198,0.15)",
    badgeTextColor: "#5b9bd9",
    accentColor: "#3178C6",
    fillColor: "linear-gradient(90deg,#3178C6,#5b9bd9)",
    duration: "4–6 tuần",
    title: "Type thinking — not syntax",
    subtitle: "Ngừng dùng TypeScript như JavaScript có thêm chú thích",
    transformation: "Sau phase này, bạn <strong>không còn nghĩ \"type này là gì\"</strong> — bạn nghĩ \"set of values nào flow vào đây, và set nào flow ra\". Types trở thành algebra, không phải labels.",
    icon: "◈",
    concepts: [
      { label: "Structural typing vs nominal typing", level: "normal" },
      { label: "Type narrowing & control flow analysis", level: "normal" },
      { label: "Union & intersection types", level: "normal" },
      { label: "Literal types & const assertions", level: "normal" },
      { label: "Discriminated unions", level: "hard" },
      { label: "never & exhaustive type checking", level: "hard" },
      { label: "Strict mode — toàn diện", level: "normal" },
      { label: "unknown vs any — khi nào dùng gì", level: "normal" },
      { label: "Type aliases vs interfaces", level: "normal" },
      { label: "Readonly & immutability patterns", level: "normal" },
    ],
    resources: [
      { type: "read", label: "TypeScript Handbook (official) — đọc như specification, không đọc qua loa" },
      { type: "repo", label: "type-challenges (GitHub) — bắt đầu từ Easy, dừng tại Medium cho phase này" },
      { type: "video", label: "Matt Pocock — TypeScript Tips series (YouTube, toàn bộ)" },
      { type: "read", label: "\"Types as Sets\" — bài blog của TypeScript team (typescriptlang.org/docs)" },

// ── STATE ──
const STATE_KEY = 'ts-roadmap-state';
let state = {};

function loadState() {
  try {
    const raw = localStorage.getItem(STATE_KEY);
    state = raw ? JSON.parse(raw) : {};
  } catch { state = {}; }
}

function saveState() {
  try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch {}
}

function getPhaseState(phaseId) {
  if (!state[phaseId]) state[phaseId] = { concepts: {}, resources: {}, exercises: {}, done: false };
  return state[phaseId];
}

function toggleItem(phaseId, category, idx) {
  const ps = getPhaseState(phaseId);
  ps[category][idx] = !ps[category][idx];
  saveState();
  renderAll();
}

function togglePhaseDone(phaseId) {
  const ps = getPhaseState(phaseId);
  ps.done = !ps.done;
  saveState();
  renderAll();
}

function confirmReset() {
  if (confirm('Reset toàn bộ progress? Hành động này không thể undo.')) {
    state = {};
    saveState();
    renderAll();
  }
}

// ── COUNTS ──
function getPhaseProgress(phase) {
  const ps = getPhaseState(phase.id);
  const total = phase.concepts.length + phase.resources.length + phase.exercises.length;
  let done = 0;
  phase.concepts.forEach((_, i) => { if (ps.concepts[i]) done++; });
  phase.resources.forEach((_, i) => { if (ps.resources[i]) done++; });
  phase.exercises.forEach((_, i) => { if (ps.exercises[i]) done++; });
  return { done, total, pct: total ? Math.round(done / total * 100) : 0 };
}

function getOverallProgress() {
  let totalDone = 0, totalAll = 0;
  PHASES.forEach(p => {
    const pg = getPhaseProgress(p);
    totalDone += pg.done;
    totalAll += pg.total;
  });
  return totalAll ? Math.round(totalDone / totalAll * 100) : 0;
}

// ── RENDER ──
function renderAll() {
  renderPhases();
  renderSidebar();
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const pct = getOverallProgress();
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';

  nav.innerHTML = PHASES.map(p => {
    const pg = getPhaseProgress(p);
    const isDone = pg.pct === 100;
    return `<a class="nav-item ${isDone ? 'done' : ''}" href="#phase-${p.id}">
      <div class="nav-dot"></div>
      <span>${p.title}</span>
      <span class="nav-phase-num">${pg.pct}%</span>
    </a>`;
  }).join('');
}

let openPhases = new Set([1]);

function renderPhases() {
  const root = document.getElementById('phases-root');
  root.innerHTML = PHASES.map(phase => renderPhase(phase)).join('');
  // re-attach events after re-render
  PHASES.forEach(phase => {
    const tabs = document.querySelectorAll(`[data-phase="${phase.id}"][data-tab]`);
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const t = tab.dataset.tab;
        document.querySelectorAll(`[data-phase="${phase.id}"][data-tab]`).forEach(x => x.classList.remove('active'));
        document.querySelectorAll(`[data-phase="${phase.id}"][data-section]`).forEach(x => x.classList.remove('active'));
        tab.classList.add('active');
        document.querySelector(`[data-phase="${phase.id}"][data-section="${t}"]`)?.classList.add('active');
      });
    });
  });
}

function renderPhase(phase) {
  const ps = getPhaseState(phase.id);
  const pg = getPhaseProgress(phase);
  const isOpen = openPhases.has(phase.id);

  const conceptsHtml = phase.concepts.map((c, i) => {
    const checked = !!ps.concepts[i];
    return `<div class="concept-item ${checked ? 'checked' : ''}" onclick="toggleItem(${phase.id},'concepts',${i})">
      <div class="concept-check"></div>
      <span class="concept-label">${c.label}</span>
      ${c.level !== 'normal' ? `<span class="concept-level level-${c.level}">${c.level === 'boss' ? '☠' : '⚡'}</span>` : ''}
    </div>`;
  }).join('');

  const resourcesHtml = phase.resources.map((r, i) => {
    const checked = !!ps.resources[i];
    return `<div class="resource-item ${checked ? 'checked' : ''}" onclick="toggleItem(${phase.id},'resources',${i})">
      <div class="resource-check"></div>
      <div class="resource-info">
        <span class="resource-type-badge rtype-${r.type}">${r.type}</span>
        <div class="resource-text">${r.label}</div>
      </div>
    </div>`;
  }).join('');

  const exercisesHtml = phase.exercises.map((e, i) => {
    const checked = !!ps.exercises[i];
    return `<div class="exercise-item ${checked ? 'checked' : ''}" onclick="toggleItem(${phase.id},'exercises',${i})">
      <div class="ex-check"></div>
      <div class="ex-body">
        <div class="ex-num">Exercise ${i + 1}</div>
        <div class="ex-text">${e.text}</div>
        ${e.note ? `<div class="ex-note">→ ${e.note}</div>` : ''}
      </div>
    </div>`;
  }).join('');

  const isDone = ps.done;

  return `
    <div class="phase-card ${isOpen ? 'is-active' : ''}" id="phase-${phase.id}">
      <div class="phase-header" onclick="togglePhaseOpen(${phase.id})">
        <div class="phase-number">${String(phase.id).padStart(2,'0')}</div>
        <div class="phase-header-info">
          <div class="phase-badges">
            <span class="phase-badge" style="background:${phase.badgeColor};color:${phase.badgeTextColor}">${phase.badge}</span>
            <span class="phase-duration">${phase.duration}</span>
          </div>
          <div class="phase-title">${phase.title}</div>
          <div class="phase-subtitle">${phase.subtitle}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-shrink:0">
          <span style="font-family:var(--mono);font-size:11px;color:${phase.accentColor}">${pg.pct}%</span>
          <span class="phase-chevron ${isOpen ? 'open' : ''}">▶</span>
        </div>
      </div>

      <div class="phase-body ${isOpen ? 'open' : ''}">
        <div class="transform-box">
          <span class="transform-icon" style="color:${phase.accentColor}">${phase.icon}</span>
          <div class="transform-text">${phase.transformation}</div>
        </div>

        <div class="section-tabs">
          <div class="section-tab active" data-phase="${phase.id}" data-tab="concepts">Concepts (${phase.concepts.length})</div>
          <div class="section-tab" data-phase="${phase.id}" data-tab="resources">Resources</div>
          <div class="section-tab" data-phase="${phase.id}" data-tab="exercises">Exercises</div>
          <div class="section-tab" data-phase="${phase.id}" data-tab="milestone">Milestone</div>
        </div>

        <div class="section-content active" data-phase="${phase.id}" data-section="concepts">
          <div class="concept-grid">${conceptsHtml}</div>
        </div>
        <div class="section-content" data-phase="${phase.id}" data-section="resources">
          <div class="resource-list">${resourcesHtml}</div>
        </div>
        <div class="section-content" data-phase="${phase.id}" data-section="exercises">
          <div class="exercise-list">${exercisesHtml}</div>
        </div>
        <div class="section-content" data-phase="${phase.id}" data-section="milestone">
          <div class="milestone-section">
            <div class="milestone-gate">
              <div class="milestone-gate-label">// gate criteria</div>
              <div class="milestone-gate-title">${phase.gate.title}</div>
              <div class="milestone-gate-desc">${phase.gate.desc}</div>
            </div>
            <div class="milestone-progress-section">
              <div class="milestone-progress-label">
                <span>Phase progress</span>
                <span style="color:${phase.accentColor}">${pg.done} / ${pg.total} items</span>
              </div>
              <div class="milestone-track">
                <div class="milestone-fill" style="width:${pg.pct}%;background:${phase.fillColor}"></div>
              </div>
              <div class="milestone-count">${pg.pct}% complete</div>
            </div>
            <button class="mark-done-btn ${isDone ? 'done' : ''}" onclick="togglePhaseDone(${phase.id})">
              ${isDone ? '✓ Phase complete' : '○ Mark phase as done'}
            </button>
          </div>
        </div>

        ${isDone ? `<div class="phase-complete-banner visible">✓ Phase ${phase.id} complete — transformation achieved</div>` : ''}
      </div>
    </div>`;
}

function togglePhaseOpen(id) {
  if (openPhases.has(id)) {
    openPhases.delete(id);
  } else {
    openPhases.add(id);
  }
  renderAll();
}

// ── INIT ──
loadState();
renderAll();
</script>
