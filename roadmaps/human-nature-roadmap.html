    body:'Freud đúng về điều quan trọng nhất: hầu hết những gì drive behavior con người là unconscious. Ego, id, superego — không cần tin vào metapsychology của Freud để thấy pattern này hoạt động. Jung đi xa hơn: Shadow là phần bị disown của self — và shadow của người khác là thứ họ project lên bạn dữ dội nhất. Timothy Wilson\'s "Strangers to Ourselves": adaptive unconscious xử lý 11 million bits/giây trong khi conscious mind chỉ xử lý 40 bits. Người ta không lying khi nói lý do hành động của họ — họ genuinely không biết. Rationalization: behavior đến trước, explanation đến sau (Jonathan Haidt\'s "The Righteous Mind"). Self-deception là feature, không phải bug: chúng ta self-deceive để maintain self-image và social standing. Key practice: khi ai đó giải thích hành động của mình, luôn hỏi: "Điều gì drive hành động đó mà họ không nói?"',

      {t:'Power and Innocence', a:'Rollo May', p:'P1', pc:'#C9A84C', w:'Existential psychology của power — what it means to be powerful responsibly'},
      {t:'The Brothers Karamazov', a:'Fyodor Dostoevsky', p:'Fiction', pc:'#5BA3A0', w:'Ultimate novel về human nature: faith, doubt, love, evil, redemption. Ivan\'s Grand Inquisitor chapter is required reading'},
      {t:'Man\'s Search for Meaning', a:'Viktor Frankl', p:'Wisdom', pc:'#8878C3', w:'Human capacity for meaning even in extremity — the foundation of why influence must serve purpose, not just power'},
    ],
    pods:[
      {n:'Being Well — Rick Hanson & Forrest Hanson', w:'Neuropsychology meets wisdom traditions — integration of science và contemplative knowledge'},
      {n:'Philosophize This! — Stephen West', w:'History of philosophy as map của human nature questions — Plato through Foucault'},
      {n:'Jung to Live By — Evans Lansing Smith', w:'Jungian psychology applied — for depth integration of psychological framework'},
    ],
    reads:[
      {n:'Works of Thomas Merton (essays)', w:'Contemplative wisdom về human nature, power, và authentic self — balances intellectual với experiential'},
      {n:'Simone Weil — selected essays', w:'One of the deepest thinkers về power, attention, và human dignity — rare combination of rigor và wisdom'},
      {n:'Journal of Analytical Psychology', w:'For Jungian depth — if you\'ve gone this far in the analytical tradition'},
    ],
    certs:[
      {n:'Jungian Analysis hoặc Analytical Psychology training', p:'3–5 năm', w:'Nếu đây là core path — intensive personal analysis combined với theoretical training'},
      {n:'PhD trong Psychology, Philosophy, hoặc related', p:'4–6 năm', w:'Nếu muốn academic authority — credential that opens deepest rooms'},
      {n:'Contemplative Practice Certification (MBSR, IFS, Somatic)', p:'1–2 năm', w:'Embodied practice completes the intellectual framework — cannot be replaced by reading'},
    ],
  }
];

let checked = {}, aS = 0, aT = 'milestones', exP = null;

function load() { try { const s=localStorage.getItem(LK); if(s) checked=JSON.parse(s); } catch{} }
function save() { try { localStorage.setItem(LK, JSON.stringify(checked)); } catch{} }
function tp() { let d=0,t=0; STAGES.forEach(s=>{t+=s.miles.length;s.miles.forEach((_,i)=>{if(checked[s.id+'_'+i])d++;});}); return{d,t}; }
function sp(s) { const t=s.miles.length,d=s.miles.filter((_,i)=>checked[s.id+'_'+i]).length; return{d,t,p:Math.round((d/t)*100)}; }

function renderTL() {
  document.getElementById('tl-in').innerHTML = STAGES.map((s,i)=>{
    const a=i===aS;
    const dots=s.miles.map((_,mi)=>`<span class="dot" style="${checked[s.id+'_'+mi]?'background:'+s.accent:''}"></span>`).join('');
    return `<button class="stab" onclick="setS(${i})" style="border-bottom-color:${a?s.accent:'transparent'}">
      <div class="stab-t" style="color:${a?s.accent:'var(--tm)'}">${s.range}</div>
      <div class="stab-n" style="color:${a?'var(--text)':'var(--ts)'};font-weight:${a?500:400}">${s.phase}</div>
      <div class="stab-d">${dots}</div>
    </button>`;
  }).join('');
}

function renderH() {
  const p=tp();
  document.getElementById('tlbl').textContent=p.d+'/'+p.t;
  const f=document.getElementById('tfill'); f.style.width=Math.round((p.d/p.t)*100)+'%'; f.style.background=STAGES[aS].accent;
}

function renderSH() {
  const s=STAGES[aS],p=sp(s);
  const ico=document.getElementById('sico'); ico.textContent=s.icon; ico.style.color=s.accent;
  const rng=document.getElementById('srng'); rng.textContent=s.range; rng.style.color=s.accent;
  document.getElementById('snm').textContent=s.phase;
  document.getElementById('ssb').textContent=s.lvl;
  const box=document.getElementById('spb'); box.style.background=s.adim; box.style.border='1px solid '+s.abdr;
  document.getElementById('spct').style.cssText='font-family:var(--mono);font-size:32px;font-weight:500;line-height:1;color:'+s.accent;
  document.getElementById('spct').textContent=p.p+'%';
  document.getElementById('scnt').textContent=p.d+'/'+p.t+' done';
  document.getElementById('sfill').style.cssText='height:100%;border-radius:1px;width:'+p.p+'%;background:'+s.accent+';transition:width 0.4s';
}

function renderIT() {
  const s=STAGES[aS];
  const tabs=aS===0?['milestones','pareto','skills','resources','wisdom']:['milestones','skills','resources','wisdom'];
  const lbl={milestones:'Milestones',pareto:'Pareto 20%',skills:'Skills',resources:'Resources',wisdom:'Wisdom'};
  document.getElementById('itabs').innerHTML=tabs.map(t=>
    `<button class="itab${aT===t?' on':''}" onclick="setT('${t}')"
      style="color:${aT===t?s.accent:'var(--ts)'};border-bottom-color:${aT===t?s.accent:'transparent'}">${lbl[t]}</button>`
  ).join('');
}

function renderP() {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('panel-'+aT).classList.add('on');
  const s=STAGES[aS];
  if(aT==='milestones') rMiles(s);
  if(aT==='pareto'&&aS===0) rPareto(s);
  if(aT==='skills') rSkills(s);
  if(aT==='resources') rRes(s);
  if(aT==='wisdom') rWisdom(s);
}

function rMiles(s) {
  const el=document.getElementById('panel-milestones');
  el.innerHTML=s.miles.map((m,i)=>{
    const done=!!checked[s.id+'_'+i];
    return `<div class="mrow${done?' done':''}" onclick="tog('${s.id}',${i})" style="${done?'border-color:'+s.abdr+';background:'+s.adim:''}">
      <div class="cb" style="${done?'background:'+s.accent+';border-color:'+s.accent:''}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#09080C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <span class="mwk" style="color:${done?s.accent:'var(--tm)'}">${m.w}</span><span class="mtxt">${m.t}</span>
      </div>
    </div>`;
  }).join('')+
  `<div class="cpb" style="border:1px solid ${s.abdr};background:${s.adim}">
    <div class="cpl" style="color:${s.accent}">Checkpoint — Dấu hiệu thực sự đạt mức này</div>
    <div class="cpx">${s.threshold}</div>
  </div>`;
}

function rPareto(s) {
  const cards=PARETO.map(pc=>{
    const ex=exP===pc.id;
    return `<div class="pc${ex?' ex':''}" id="pc-${pc.id}">
      <div class="ph" onclick="togP('${pc.id}')">
        <span class="pn" style="color:${s.accent}">${pc.num}</span>
        <div class="pm"><div class="pt">${pc.title}</div><div class="pu">${pc.unlock}</div></div>
        <span class="ptm">${pc.time}</span>
        <svg class="pch" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 5L7 9L11 5" stroke="var(--ts)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="pb" style="border-top-color:${s.abdr}">
        <div class="pbx">${pc.body}</div>
        <div class="prl">Resources cụ thể</div>
        ${pc.resources.map(r=>`<div class="pri"><span class="pra" style="color:${s.accent}">▸</span><span class="prt">${r}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
  document.getElementById('panel-pareto').innerHTML=
    `<div class="pi"><div class="pil">5 lenses thay đổi perception — không phải information, mà là cách nhìn</div>
    <div class="pit">Đây là 20% dẫn đến 80% khả năng đọc và influence người khác. Không phải knowledge để accumulate — mà là new perception để develop. Khi 5 frameworks này internalized, bạn không thể unsee chúng trong mọi tương tác.</div></div>${cards}`;
}

function rSkills(s) {
  document.getElementById('panel-skills').innerHTML=
    `<div id="sg">${s.skills.map(sk=>`
      <div class="sc">
        <div class="stl" style="color:${s.accent}">${sk.t}</div>
        ${sk.i.map(it=>`<div class="si"><span class="sa" style="color:${s.accent}">▸</span><span class="sx">${it}</span></div>`).join('')}
      </div>`).join('')}</div>`;
}

function rRes(s) {
  const bks=s.books.map(b=>`
    <div class="rb">
      <div class="rbar" style="background:${b.pc}"></div>
      <div class="rbi">
        <div class="rtr"><span class="rtt">${b.t}</span><span class="rta">— ${b.a}</span><span class="rpri" style="color:${b.pc}">${b.p}</span></div>
        <div class="rwy">${b.w}</div>
      </div>
    </div>`).join('');
  const pods=s.pods.map(p=>`<div class="rc"><div class="rcn">${p.n}</div><div class="rcw">${p.w}</div></div>`).join('');
  const reads=s.reads.map(r=>`<div class="rc"><div class="rcn">${r.n}</div><div class="rcw">${r.w}</div></div>`).join('');
  const certs=s.certs.map(c=>`
    <div class="rct">
      <div class="rcb" style="color:${s.accent};background:${s.adim};border:1px solid ${s.abdr}">${c.p}</div>
      <div><div class="rctn">${c.n}</div><div class="rctw">${c.w}</div></div>
    </div>`).join('');
  document.getElementById('panel-resources').innerHTML=
    `<div class="rs"><div class="rsl">Sách</div>${bks}</div>
    <div class="r2"><div><div class="rsl">Podcast</div>${pods}</div><div><div class="rsl">Reading & Essays</div>${reads}</div></div>
    <div class="rs"><div class="rsl">Certifications & Practice</div>${certs}</div>`;
}

function rWisdom(s) {
  const cards=s.wcards.map(w=>`
    <div class="wc"><div class="wcl" style="color:${s.accent}">${w.t}</div><div class="wcx">${w.b}</div></div>`).join('');
  document.getElementById('panel-wisdom').innerHTML=
    `<div class="wm" style="border:1px solid ${s.abdr};background:${s.adim}">
      <div class="wl" style="color:${s.accent}">Core Wisdom — ${s.phase}</div>
      <div class="wt">${s.wisdom}</div>
    </div><div class="wg">${cards}</div>`;
}

function renderFtr() {
  const p=tp(); document.getElementById('fl').textContent='Progress tự động lưu · '+p.d+'/'+p.t+' milestones hoàn thành';
}

function render() { renderH();renderTL();renderSH();renderIT();renderP();renderFtr(); }
function setS(i) { aS=i;aT='milestones';exP=null;render(); }
function setT(t) { aT=t;render(); }
function tog(id,i) { const k=id+'_'+i; checked[k]=!checked[k]; save(); render(); }
function togP(id) { exP=exP===id?null:id; renderP(); }

load(); render();
</script>
</body>
</html>
