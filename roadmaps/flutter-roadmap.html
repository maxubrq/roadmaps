<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flutter → Top 1% Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e0f;
  --bg2: #161618;
  --bg3: #1e1e21;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8e4dc;
  --muted: #6b6860;
  --muted2: #9a958c;
  --mono: 'DM Mono', monospace;
  --serif: 'Fraunces', serif;
  --accent: #c8b560;
  --phase-color: #c8b560;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.7;min-height:100vh}

/* ── scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── layout ── */
.shell{display:grid;grid-template-columns:240px 1fr;min-height:100vh}

/* ── sidebar ── */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:0;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sidebar-logo{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.sidebar-logo .wordmark{font-family:var(--serif);font-size:17px;font-weight:300;color:var(--text);letter-spacing:.02em;line-height:1.3}
.sidebar-logo .wordmark em{font-style:italic;color:var(--accent)}
.sidebar-logo .sub{font-size:11px;color:var(--muted);margin-top:4px;letter-spacing:.05em}

.overall-progress{padding:16px 24px;border-bottom:1px solid var(--border)}
.op-label{font-size:11px;color:var(--muted);letter-spacing:.08em;margin-bottom:8px}
.op-count{font-size:22px;font-weight:500;font-family:var(--serif);color:var(--text);margin-bottom:8px}
.op-count span{font-size:13px;font-weight:300;color:var(--muted2)}
.progress-track{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .5s ease;width:0%}

.phase-nav{padding:16px 0;flex:1}
.phase-nav-label{font-size:10px;letter-spacing:.1em;color:var(--muted);padding:0 24px;margin-bottom:8px}
.phase-link{display:flex;align-items:center;gap:10px;padding:9px 24px;cursor:pointer;transition:background .15s;border:none;background:transparent;width:100%;text-align:left;color:var(--muted2);font-family:var(--mono);font-size:12px;border-left:2px solid transparent}
.phase-link:hover{background:var(--bg3);color:var(--text)}
.phase-link.active{background:var(--bg3);color:var(--text);border-left-color:var(--phase-color)}
.phase-link .ph-score{font-size:11px;margin-left:auto;font-weight:500}
.phase-link .ph-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--border2)}
.phase-link.active .ph-dot{background:var(--phase-color)}
.phase-mini-bar{height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin:4px 24px 0;width:calc(100% - 48px)}
.phase-mini-fill{height:100%;background:var(--phase-color);border-radius:1px;transition:width .4s;width:0%}

.sidebar-footer{padding:20px 24px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}

/* ── main ── */
.main{padding:0}
.phase-section{display:none;padding:48px 56px;max-width:880px}
.phase-section.visible{display:block}

.phase-header{margin-bottom:40px}
.phase-eyebrow{font-size:11px;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.phase-eyebrow span{color:var(--phase-color);font-weight:500}
.phase-title{font-family:var(--serif);font-size:36px;font-weight:300;line-height:1.25;color:var(--text);margin-bottom:14px}
.phase-title em{font-style:italic;color:var(--phase-color)}
.phase-desc{font-size:13px;color:var(--muted2);line-height:1.7;max-width:600px}

.score-display{display:flex;align-items:center;gap:16px;margin:20px 0}
.score-num{font-family:var(--serif);font-size:48px;font-weight:300;color:var(--phase-color);line-height:1}
.score-10{font-size:20px;color:var(--muted);font-weight:300}
.score-bar-wrap{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.score-bar-fill{height:100%;background:var(--phase-color);border-radius:2px;transition:width .8s ease}

/* ── principle ── */
.principle{border:1px solid var(--border2);background:var(--bg2);border-radius:8px;padding:18px 22px;margin:28px 0;position:relative;overflow:hidden}
.principle::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--phase-color)}
.principle-label{font-size:10px;letter-spacing:.1em;color:var(--phase-color);margin-bottom:6px}
.principle-text{font-size:13px;color:var(--muted2);line-height:1.75;font-style:italic}

/* ── section headings ── */
.s-heading{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.1em;color:var(--muted);margin:36px 0 14px;text-transform:uppercase}
.s-heading::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── topic cards ── */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:8px}
.topic-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:border-color .15s}
.topic-card:hover{border-color:var(--border2)}
.topic-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.topic-body{font-size:12px;color:var(--muted2);line-height:1.6}

/* ── resources ── */
.resource-list{display:flex;flex-direction:column;gap:6px}
.resource-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:12px;transition:border-color .15s}
.resource-item:hover{border-color:var(--border2)}
.r-type{font-size:10px;font-weight:500;padding:2px 8px;border-radius:100px;letter-spacing:.04em;min-width:50px;text-align:center}
.r-name{flex:1;color:var(--text)}
.r-link{font-size:11px;color:var(--muted);font-style:italic}

/* ── checkboxes: exercises & milestones ── */
.check-list{display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.check-item:hover{border-color:var(--border2)}
.check-item.done{border-color:var(--phase-color);background:color-mix(in srgb,var(--phase-color) 5%,var(--bg2))}
.check-item.done .ci-text{color:var(--muted)}
.check-item.done .ci-title{text-decoration:line-through;color:var(--muted)}
.check-box{width:18px;height:18px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;background:transparent}
.check-item.done .check-box{background:var(--phase-color);border-color:var(--phase-color)}
.check-icon{width:10px;height:10px;opacity:0;transition:opacity .15s}
.check-icon::before{content:'';display:block;width:5px;height:8px;border-right:1.5px solid var(--bg);border-bottom:1.5px solid var(--bg);transform:rotate(45deg) translate(-1px,-2px)}
.check-item.done .check-icon{opacity:1}
.ci-text{flex:1}
.ci-title{font-size:13px;font-weight:500;color:var(--text);display:block;margin-bottom:2px;transition:all .15s}
.ci-desc{font-size:12px;color:var(--muted2);line-height:1.6}
.ci-tag{display:inline-block;font-size:10px;padding:1px 7px;border-radius:100px;background:var(--bg3);color:var(--muted);border:1px solid var(--border);margin-bottom:4px;letter-spacing:.03em}

/* ── mobile toggle ── */
.mobile-bar{display:none;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.mobile-logo{font-family:var(--serif);font-size:15px;font-weight:300;color:var(--text)}
.mobile-logo em{font-style:italic;color:var(--accent)}
.mobile-toggle{background:transparent;border:1px solid var(--border2);color:var(--text);padding:6px 12px;border-radius:4px;font-family:var(--mono);font-size:11px;cursor:pointer}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.mobile-overlay.open{display:block}
.mobile-sidebar{position:fixed;left:0;top:0;bottom:0;width:260px;background:var(--bg2);border-right:1px solid var(--border);z-index:100;overflow-y:auto;transform:translateX(-100%);transition:transform .2s}
.mobile-sidebar.open{transform:translateX(0)}

@media(max-width:800px){
  .shell{grid-template-columns:1fr}
  .sidebar{display:none}
  .mobile-bar{display:flex}
  .main{padding:0}
  .phase-section{padding:28px 24px}
  .phase-title{font-size:26px}
  .score-num{font-size:36px}
  .topic-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- mobile bar -->
<div class="mobile-bar">
  <div class="mobile-logo">Flutter <em>→</em> Top 1%</div>
  <button class="mobile-toggle" onclick="toggleMobile()">☰ Phases</button>
</div>
<div class="mobile-overlay" id="mOverlay" onclick="toggleMobile()"></div>
<div class="mobile-sidebar" id="mSidebar"></div>

<div class="shell">

  <main class="main" id="main"></main>
</div>

// ── state ──
function getSaved() {
  try { return JSON.parse(localStorage.getItem('flutter-roadmap-v1') || '{}'); } catch { return {}; }
}
function saveState(state) {
  try { localStorage.setItem('flutter-roadmap-v1', JSON.stringify(state)); } catch {}
}

let saved = getSaved();
let currentPhase = 0;

// ── count total checkboxes ──
function totalItems() {
  return PHASES.reduce((s,p)=>s+p.exercises.length+p.milestones.length,0);
}
function checkedItems() {
  return Object.values(saved).filter(Boolean).length;
}

// ── update overall progress ──
function updateOverall() {
  const total = totalItems(), checked = checkedItems();
  const pct = total ? Math.round(checked/total*100) : 0;
  document.getElementById('op-count').innerHTML = `${checked} <span>/ ${total} tasks</span>`;
  document.getElementById('op-fill').style.width = pct+'%';
}

// ── update per-phase mini bars ──
function updateMiniBars() {
  PHASES.forEach((p,i) => {
    const keys = [...p.exercises.map((_,j)=>`${p.id}-ex-${j}`), ...p.milestones.map((_,j)=>`${p.id}-ms-${j}`)];
    const done = keys.filter(k=>saved[k]).length;
    const pct = keys.length ? done/keys.length*100 : 0;
    const bar = document.getElementById(`mini-bar-${i}`);
    if(bar) bar.style.width = pct+'%';
  });
}

// ── toggle checkbox ──
function toggle(key) {
  saved[key] = !saved[key];
  saveState(saved);
  const el = document.querySelector(`[data-key="${key}"]`);
  if(el) el.classList.toggle('done', !!saved[key]);
  updateOverall();
  updateMiniBars();
}

// ── render sidebar links ──
function renderSidebar(container) {
  container.innerHTML = PHASES.map((p,i)=>`
    <button class="phase-link${i===currentPhase?' active':''}" onclick="showPhase(${i})" style="${i===currentPhase?'--phase-color:'+p.color:''}">
      <span class="ph-dot"></span>
      <span>${p.label}<br><span style="font-size:10px;opacity:.6">${p.sublabel}</span></span>
      <span class="ph-score" style="color:${p.color}">${p.score}</span>
    </button>
    <div class="phase-mini-bar"><div class="phase-mini-fill" id="mini-bar-${i}" style="background:${p.color}"></div></div>
  `).join('');
}

// ── render all phase sections ──
function renderMain() {
  const main = document.getElementById('main');
  main.innerHTML = PHASES.map((p,i) => `
    <section class="phase-section${i===currentPhase?' visible':''}" id="section-${i}" style="--phase-color:${p.color}">
      <div class="phase-header">
        <div class="phase-eyebrow"><span>${p.eyebrow}</span></div>
        <h1 class="phase-title">${p.title.replace(/\n/g,'<br>')}</h1>
        <p class="phase-desc">${p.desc}</p>
      </div>

      <div class="score-display">
        <div class="score-num">${p.score}<span class="score-10"> /10</span></div>
        <div class="score-bar-wrap"><div class="score-bar-fill" style="width:${p.scoreWidth}"></div></div>
      </div>

      <div class="principle">
        <div class="principle-label">NGUYÊN TẮC CỐT LÕI</div>
        <div class="principle-text">${p.principle}</div>
      </div>

      <div class="s-heading">Core topics</div>
      <div class="topic-grid">
        ${p.topics.map(t=>`
          <div class="topic-card">
            <div class="topic-name">${t.name}</div>
            <div class="topic-body">${t.body}</div>
          </div>
        `).join('')}
      </div>

      <div class="s-heading">Tài nguyên</div>
      <div class="resource-list">
        ${p.resources.map(r=>`
          <div class="resource-item">
            <span class="r-type" style="${r.typeStyle}">${r.type}</span>
            <span class="r-name">${r.name}</span>
            <span class="r-link">${r.link}</span>
          </div>
        `).join('')}
      </div>

      <div class="s-heading">Bài tập & thực hành</div>
      <div class="check-list">
        ${p.exercises.map((e,j) => {
          const key=`${p.id}-ex-${j}`, done=!!saved[key];
          return `<div class="check-item${done?' done':''}" data-key="${key}" onclick="toggle('${key}')">
            <div class="check-box"><div class="check-icon"></div></div>
            <div class="ci-text">
              <span class="ci-tag">${e.tag}</span>
              <span class="ci-title">${e.title}</span>
              <span class="ci-desc">${e.desc}</span>
            </div>
          </div>`;
        }).join('')}
      </div>

      <div class="s-heading">Milestones — không thể lùi</div>
      <div class="check-list">
        ${p.milestones.map((m,j) => {
          const key=`${p.id}-ms-${j}`, done=!!saved[key];
          return `<div class="check-item${done?' done':''}" data-key="${key}" onclick="toggle('${key}')">
            <div class="check-box"><div class="check-icon"></div></div>
            <div class="ci-text">
              <span class="ci-title">${m.title}</span>
              <span class="ci-desc">${m.desc}</span>
            </div>
          </div>`;
        }).join('')}
      </div>
    </section>
  `).join('');
}

// ── switch phase ──
function showPhase(idx) {
  currentPhase = idx;
  document.querySelectorAll('.phase-section').forEach((s,i)=>s.classList.toggle('visible',i===idx));
  document.querySelectorAll('.phase-link').forEach((b,i)=>{
    b.classList.toggle('active',i===idx);
    b.style = i===idx ? '--phase-color:'+PHASES[idx].color : '';
  });
  // mobile: close sidebar
  document.getElementById('mSidebar').classList.remove('open');
  document.getElementById('mOverlay').classList.remove('open');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── mobile ──
function toggleMobile() {
  document.getElementById('mSidebar').classList.toggle('open');
  document.getElementById('mOverlay').classList.toggle('open');
}

// ── init ──
function init() {
  renderSidebar(document.getElementById('sidebar-links'));
  renderMain();
  // clone sidebar to mobile sidebar
  document.getElementById('mSidebar').innerHTML = document.getElementById('sidebar').innerHTML;
  document.getElementById('mSidebar').querySelector('#sidebar-links').innerHTML = document.getElementById('sidebar-links').innerHTML;
  updateOverall();
  updateMiniBars();
}

init();
</script>
